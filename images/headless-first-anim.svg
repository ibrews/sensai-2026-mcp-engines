<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="hf-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      /* Flowing dots along the main headless paths */
      @keyframes flowMain {
        0%   { stroke-dashoffset: 32; }
        100% { stroke-dashoffset: 0; }
      }
      /* Faint pulse for the MCP side-branch */
      @keyframes flowMcp {
        0%   { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      /* Travelling dot for each lane */
      @keyframes dotLane0 {
        0%   { offset-distance:0%; opacity:0; }
        8%   { opacity:1; }
        85%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      @keyframes dotLane1 {
        0%   { offset-distance:0%; opacity:0; }
        8%   { opacity:1; }
        85%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      @keyframes dotLane2 {
        0%   { offset-distance:0%; opacity:0; }
        8%   { opacity:1; }
        85%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      @keyframes dotLane3 {
        0%   { offset-distance:0%; opacity:0; }
        8%   { opacity:1; }
        85%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      /* second dot per lane, offset in time */
      @keyframes dotLane0b {
        0%   { offset-distance:0%; opacity:0; }
        8%   { opacity:1; }
        85%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      @keyframes dotLane1b {
        0%   { offset-distance:0%; opacity:0; }
        8%   { opacity:1; }
        85%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      @keyframes dotLane2b {
        0%   { offset-distance:0%; opacity:0; }
        8%   { opacity:1; }
        85%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      @keyframes dotLane3b {
        0%   { offset-distance:0%; opacity:0; }
        8%   { opacity:1; }
        85%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      /* MCP dot — slower, dimmer */
      @keyframes dotMcp {
        0%   { offset-distance:0%; opacity:0; }
        12%  { opacity:0.6; }
        85%  { opacity:0.6; }
        100% { offset-distance:100%; opacity:0; }
      }

      .flow-main { stroke-dasharray: 10 7; animation: flowMain 1.1s linear infinite; }
      .flow-main-1 { stroke-dasharray: 10 7; animation: flowMain 1.1s linear infinite 0.28s; }
      .flow-main-2 { stroke-dasharray: 10 7; animation: flowMain 1.1s linear infinite 0.56s; }
      .flow-main-3 { stroke-dasharray: 10 7; animation: flowMain 1.1s linear infinite 0.84s; }
      .flow-mcp    { stroke-dasharray: 6 8;  animation: flowMcp 2s linear infinite; }

      /* lane 0: Blender  y=108  path: engine(120)→cmd(290)→output(530) */
      .dot-l0  { offset-path: path('M 162,108 L 530,108'); animation: dotLane0  2s ease-in infinite; }
      .dot-l0b { offset-path: path('M 162,108 L 530,108'); animation: dotLane0b 2s ease-in infinite 1s; }
      /* lane 1: Unreal   y=196 */
      .dot-l1  { offset-path: path('M 162,196 L 530,196'); animation: dotLane1  2s ease-in infinite 0.5s; }
      .dot-l1b { offset-path: path('M 162,196 L 530,196'); animation: dotLane1b 2s ease-in infinite 1.5s; }
      /* lane 2: Godot    y=284 */
      .dot-l2  { offset-path: path('M 162,284 L 530,284'); animation: dotLane2  2s ease-in infinite 1s; }
      .dot-l2b { offset-path: path('M 162,284 L 530,284'); animation: dotLane2b 2s ease-in infinite 0s; }
      /* lane 3: RealityKit y=372 */
      .dot-l3  { offset-path: path('M 162,372 L 530,372'); animation: dotLane3  2s ease-in infinite 1.5s; }
      .dot-l3b { offset-path: path('M 162,372 L 530,372'); animation: dotLane3b 2s ease-in infinite 0.75s; }

      /* MCP dot: from CLI node on lane 1 (Unreal) up to MCP box */
      .dot-mcp { offset-path: path('M 356,196 C 356,150 560,130 620,130'); animation: dotMcp 3.5s ease-in-out infinite; }

      /* subtle output node glow pulse */
      @keyframes outPulse {
        0%,100% { opacity:.9; }
        50%     { opacity:.55; }
      }
      .out-pulse { animation: outPulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="13" letter-spacing="3">HEADLESS-FIRST — THE QUIET MAJORITY OF THE WORK</text>

  <!-- ─── LANE BACKGROUNDS ─── -->
  <!-- Blender lane -->
  <rect x="0" y="76" width="820" height="68" rx="0" fill="rgba(244,63,94,.04)"/>
  <!-- Unreal lane -->
  <rect x="0" y="164" width="820" height="68" fill="rgba(245,158,11,.04)"/>
  <!-- Godot lane -->
  <rect x="0" y="252" width="820" height="68" fill="rgba(0,212,255,.04)"/>
  <!-- RealityKit lane -->
  <rect x="0" y="340" width="820" height="68" fill="rgba(167,139,250,.04)"/>

  <!-- Lane dividers -->
  <line x1="0" y1="76"  x2="820" y2="76"  stroke="rgba(240,244,255,.08)" stroke-width="1"/>
  <line x1="0" y1="144" x2="820" y2="144" stroke="rgba(240,244,255,.06)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="0" y1="232" x2="820" y2="232" stroke="rgba(240,244,255,.06)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="0" y1="320" x2="820" y2="320" stroke="rgba(240,244,255,.06)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="0" y1="408" x2="820" y2="408" stroke="rgba(240,244,255,.08)" stroke-width="1"/>

  <!-- ─── COLUMN HEADER ─── -->
  <rect x="140" y="44" width="820" height="32" fill="rgba(240,244,255,.02)"/>
  <text x="356" y="63" text-anchor="middle" fill="rgba(240,244,255,.35)" font-size="10.5" font-weight="600" letter-spacing="1.5">CLI COMMAND</text>
  <text x="530" y="63" text-anchor="middle" fill="rgba(240,244,255,.35)" font-size="10.5" font-weight="600" letter-spacing="1.5">OUTPUT</text>

  <!-- ─── ENGINE LABELS (col 0) ─── -->
  <!-- Blender -->
  <rect x="4" y="80" width="130" height="60" rx="10" fill="rgba(244,63,94,.08)" stroke="rgba(244,63,94,.35)" stroke-width="1.5"/>
  <text x="69" y="106" text-anchor="middle" fill="#f43f5e" font-size="15" font-weight="700">Blender</text>
  <text x="69" y="124" text-anchor="middle" fill="rgba(244,63,94,.55)" font-size="10">3.x / 4.x</text>

  <!-- Unreal -->
  <rect x="4" y="168" width="130" height="60" rx="10" fill="rgba(245,158,11,.08)" stroke="rgba(245,158,11,.35)" stroke-width="1.5"/>
  <text x="69" y="194" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="700">Unreal</text>
  <text x="69" y="212" text-anchor="middle" fill="rgba(245,158,11,.55)" font-size="10">UE 5.x</text>

  <!-- Godot -->
  <rect x="4" y="256" width="130" height="60" rx="10" fill="rgba(0,212,255,.08)" stroke="rgba(0,212,255,.35)" stroke-width="1.5"/>
  <text x="69" y="282" text-anchor="middle" fill="#00d4ff" font-size="15" font-weight="700">Godot</text>
  <text x="69" y="300" text-anchor="middle" fill="rgba(0,212,255,.55)" font-size="10">4.x</text>

  <!-- RealityKit -->
  <rect x="4" y="344" width="130" height="60" rx="10" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.35)" stroke-width="1.5"/>
  <text x="69" y="366" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700">RealityKit</text>
  <text x="69" y="384" text-anchor="middle" fill="rgba(167,139,250,.55)" font-size="10">Xcode / Swift</text>

  <!-- ─── MAIN CLI PATHS — animated flowing dash ─── -->
  <!-- Blender: 162→530, y=108 -->
  <line class="flow-main"   x1="162" y1="108" x2="298" y2="108" stroke="#f43f5e" stroke-width="2.5" stroke-opacity=".7" filter="url(#hf-glow)"/>
  <line class="flow-main"   x1="412" y1="108" x2="528" y2="108" stroke="#f43f5e" stroke-width="2.5" stroke-opacity=".7" filter="url(#hf-glow)"/>
  <!-- Unreal: y=196 -->
  <line class="flow-main-1" x1="162" y1="196" x2="298" y2="196" stroke="#f59e0b" stroke-width="2.5" stroke-opacity=".7" filter="url(#hf-glow)"/>
  <line class="flow-main-1" x1="412" y1="196" x2="528" y2="196" stroke="#f59e0b" stroke-width="2.5" stroke-opacity=".7" filter="url(#hf-glow)"/>
  <!-- Godot: y=284 -->
  <line class="flow-main-2" x1="162" y1="284" x2="298" y2="284" stroke="#00d4ff" stroke-width="2.5" stroke-opacity=".7" filter="url(#hf-glow)"/>
  <line class="flow-main-2" x1="412" y1="284" x2="528" y2="284" stroke="#00d4ff" stroke-width="2.5" stroke-opacity=".7" filter="url(#hf-glow)"/>
  <!-- RealityKit: y=372 -->
  <line class="flow-main-3" x1="162" y1="372" x2="298" y2="372" stroke="#a78bfa" stroke-width="2.5" stroke-opacity=".7" filter="url(#hf-glow)"/>
  <line class="flow-main-3" x1="412" y1="372" x2="528" y2="372" stroke="#a78bfa" stroke-width="2.5" stroke-opacity=".7" filter="url(#hf-glow)"/>

  <!-- ─── CLI COMMAND BOXES (col 1) ─── -->
  <!-- Blender -->
  <rect x="300" y="84" width="110" height="48" rx="10" fill="rgba(244,63,94,.1)" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="355" y="104" text-anchor="middle" fill="#ffd7df" font-size="10.5" font-weight="600">blender</text>
  <text x="355" y="120" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="9.5">--background --python</text>

  <!-- Unreal -->
  <rect x="300" y="172" width="110" height="48" rx="10" fill="rgba(245,158,11,.1)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="355" y="192" text-anchor="middle" fill="#fde68a" font-size="10.5" font-weight="600">UnrealEditor-Cmd</text>
  <text x="355" y="208" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="9.5">commandlets · UAT</text>

  <!-- Godot -->
  <rect x="300" y="260" width="110" height="48" rx="10" fill="rgba(0,212,255,.1)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="355" y="280" text-anchor="middle" fill="#b9f3ff" font-size="10.5" font-weight="600">godot</text>
  <text x="355" y="296" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="9.5">--headless --export</text>

  <!-- RealityKit -->
  <rect x="300" y="348" width="110" height="48" rx="10" fill="rgba(167,139,250,.1)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="355" y="366" text-anchor="middle" fill="#ddd6fe" font-size="10.5" font-weight="600">xcodebuild</text>
  <text x="355" y="382" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="9.5">xcrun simctl</text>

  <!-- ─── OUTPUT BOXES (col 2) ─── -->
  <!-- Blender -->
  <rect class="out-pulse" x="530" y="84" width="130" height="48" rx="10" fill="rgba(244,63,94,.09)" stroke="rgba(244,63,94,.4)" stroke-width="1.5"/>
  <text x="595" y="104" text-anchor="middle" fill="#f43f5e" font-size="11" font-weight="700">RENDER</text>
  <text x="595" y="120" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="10">frames · exports</text>

  <!-- Unreal -->
  <rect class="out-pulse" x="530" y="172" width="130" height="48" rx="10" fill="rgba(245,158,11,.09)" stroke="rgba(245,158,11,.4)" stroke-width="1.5"/>
  <text x="595" y="192" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">BUILD / COOK</text>
  <text x="595" y="208" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="10">pak · stage · ship</text>

  <!-- Godot -->
  <rect class="out-pulse" x="530" y="260" width="130" height="48" rx="10" fill="rgba(0,212,255,.09)" stroke="rgba(0,212,255,.4)" stroke-width="1.5"/>
  <text x="595" y="280" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="700">EXPORT / TEST</text>
  <text x="595" y="296" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="10">binary · GUT tests</text>

  <!-- RealityKit -->
  <rect class="out-pulse" x="530" y="348" width="130" height="48" rx="10" fill="rgba(167,139,250,.09)" stroke="rgba(167,139,250,.4)" stroke-width="1.5"/>
  <text x="595" y="366" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">TEST / INSTALL</text>
  <text x="595" y="382" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="10">sim · device</text>

  <!-- ─── TRAVELLING DOTS on headless paths ─── -->
  <circle class="dot-l0"  r="5" fill="#f43f5e" opacity="0"/>
  <circle class="dot-l0b" r="5" fill="#f43f5e" opacity="0"/>
  <circle class="dot-l1"  r="5" fill="#f59e0b" opacity="0"/>
  <circle class="dot-l1b" r="5" fill="#f59e0b" opacity="0"/>
  <circle class="dot-l2"  r="5" fill="#00d4ff" opacity="0"/>
  <circle class="dot-l2b" r="5" fill="#00d4ff" opacity="0"/>
  <circle class="dot-l3"  r="5" fill="#a78bfa" opacity="0"/>
  <circle class="dot-l3b" r="5" fill="#a78bfa" opacity="0"/>

  <!-- ─── MCP SIDE-BRANCH (exception, Unreal lane only) ─── -->
  <!-- Curved line from Unreal CLI node up-right to MCP box -->
  <path class="flow-mcp" d="M 356,172 C 356,138 590,122 648,138" fill="none" stroke="rgba(167,139,250,.5)" stroke-width="1.8" filter="url(#hf-glow)"/>

  <!-- MCP box — visibly smaller, dimmer, secondary -->
  <rect x="660" y="110" width="148" height="58" rx="12" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.4)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="734" y="134" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">MCP</text>
  <text x="734" y="151" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="10">only for live</text>
  <text x="734" y="164" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="10">editor state</text>

  <!-- "EXCEPTION" badge -->
  <rect x="675" y="94" width="118" height="18" rx="9" fill="rgba(167,139,250,.18)" stroke="rgba(167,139,250,.45)" stroke-width="1"/>
  <text x="734" y="107" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-weight="700" letter-spacing="1">EXCEPTION</text>

  <!-- MCP travelling dot (slower, dimmer) -->
  <circle class="dot-mcp" r="3.5" fill="#a78bfa" opacity="0"/>

  <!-- ─── BOTTOM LEGEND ─── -->
  <line x1="140" y1="432" x2="220" y2="432" stroke="#00d4ff" stroke-width="2.5" stroke-dasharray="10 7"/>
  <text x="230" y="437" fill="rgba(240,244,255,.55)" font-size="11">headless CLI — the meal</text>

  <line x1="430" y1="432" x2="510" y2="432" stroke="rgba(167,139,250,.5)" stroke-width="1.8" stroke-dasharray="6 8"/>
  <text x="520" y="437" fill="rgba(240,244,255,.55)" font-size="11">MCP branch — the spice</text>

  <!-- Bottom tagline -->
  <text x="410" y="470" text-anchor="middle" fill="rgba(240,244,255,.35)" font-size="12.5" font-style="italic">headless CLI = the meal · MCP = the spice</text>
</svg>
