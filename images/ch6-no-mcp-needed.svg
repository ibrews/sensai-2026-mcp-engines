<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0,0 L6,4 L0,8" fill="none" stroke="#00d4ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="410" y="30" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="13" letter-spacing="3">ONE LOOP · FIVE SHELL COMMANDS · NO EDITOR, NO PLUGIN</text>

  <!-- Pipeline: 5 pills -->
  <g font-family="'SF Mono','Menlo',monospace">
    <!-- pill 1 -->
    <rect x="20" y="64" width="138" height="58" rx="11" fill="rgba(0,212,255,.07)" stroke="rgba(0,212,255,.4)" stroke-width="1.3"/>
    <text x="89" y="89" text-anchor="middle" fill="#cfe9ff" font-size="13" font-weight="600">edit</text>
    <text x="89" y="107" text-anchor="middle" fill="rgba(207,233,255,.7)" font-size="11">.gd · .tscn</text>
    <!-- pill 2 -->
    <rect x="178" y="64" width="138" height="58" rx="11" fill="rgba(0,212,255,.07)" stroke="rgba(0,212,255,.4)" stroke-width="1.3"/>
    <text x="247" y="89" text-anchor="middle" fill="#cfe9ff" font-size="12.5" font-weight="600">godot --headless</text>
    <text x="247" y="107" text-anchor="middle" fill="rgba(207,233,255,.7)" font-size="11">validate</text>
    <!-- pill 3 -->
    <rect x="336" y="64" width="138" height="58" rx="11" fill="rgba(0,212,255,.07)" stroke="rgba(0,212,255,.4)" stroke-width="1.3"/>
    <text x="405" y="89" text-anchor="middle" fill="#cfe9ff" font-size="12.5" font-weight="600">--export-pack</text>
    <text x="405" y="107" text-anchor="middle" fill="rgba(207,233,255,.7)" font-size="11">.pck</text>
    <!-- pill 4 -->
    <rect x="494" y="64" width="138" height="58" rx="11" fill="rgba(0,212,255,.07)" stroke="rgba(0,212,255,.4)" stroke-width="1.3"/>
    <text x="563" y="89" text-anchor="middle" fill="#cfe9ff" font-size="13" font-weight="600">xcodebuild</text>
    <text x="563" y="107" text-anchor="middle" fill="rgba(207,233,255,.7)" font-size="11">archive</text>
    <!-- pill 5 -->
    <rect x="652" y="64" width="148" height="58" rx="11" fill="rgba(0,212,255,.07)" stroke="rgba(0,212,255,.4)" stroke-width="1.3"/>
    <text x="726" y="89" text-anchor="middle" fill="#cfe9ff" font-size="13" font-weight="600">devicectl</text>
    <text x="726" y="107" text-anchor="middle" fill="rgba(207,233,255,.7)" font-size="11">install</text>
  </g>
  <!-- arrows between pills -->
  <g stroke="#00d4ff" stroke-width="1.6">
    <line x1="160" y1="93" x2="174" y2="93" marker-end="url(#ar)"/>
    <line x1="318" y1="93" x2="332" y2="93" marker-end="url(#ar)"/>
    <line x1="476" y1="93" x2="490" y2="93" marker-end="url(#ar)"/>
    <line x1="634" y1="93" x2="648" y2="93" marker-end="url(#ar)"/>
  </g>
  <text x="410" y="142" text-anchor="middle" fill="rgba(0,212,255,.55)" font-size="11" letter-spacing="1.5">no GUI · no editor process · no plugin handshake</text>

  <!-- divider -->
  <line x1="60" y1="170" x2="760" y2="170" stroke="rgba(240,244,255,.1)" stroke-width="1"/>
  <text x="410" y="192" text-anchor="middle" fill="rgba(240,244,255,.4)" font-size="11" letter-spacing="2.5">WHY NO PLUGIN — THE FILES JUST COOPERATE</text>

  <!-- Godot column (cooperates) -->
  <rect x="60" y="212" width="330" height="214" rx="14" fill="rgba(0,212,255,.05)" stroke="rgba(0,212,255,.28)" stroke-width="1.3"/>
  <text x="84" y="244" fill="#00d4ff" font-size="15" font-weight="700">Godot</text>
  <text x="84" y="263" fill="rgba(240,244,255,.5)" font-size="11.5">cooperates with text tools out of the box</text>
  <g fill="rgba(240,244,255,.82)" font-size="13">
    <circle cx="88" cy="291" r="3" fill="#00d4ff"/><text x="100" y="295">.gd · .tscn · .tres are plain-text</text>
    <circle cx="88" cy="320" r="3" fill="#00d4ff"/><text x="100" y="324">Read · Edit · Write work directly</text>
    <circle cx="88" cy="349" r="3" fill="#00d4ff"/><text x="100" y="353">real headless CLI: validate + export</text>
  </g>
  <text x="84" y="402" fill="#7fe3ff" font-size="14" font-weight="600">→ Claude + bash is enough</text>

  <!-- Unreal column (contrast) -->
  <rect x="430" y="212" width="330" height="214" rx="14" fill="rgba(245,158,11,.045)" stroke="rgba(245,158,11,.25)" stroke-width="1.3"/>
  <text x="454" y="244" fill="#f59e0b" font-size="15" font-weight="700">Unreal</text>
  <text x="454" y="263" fill="rgba(240,244,255,.5)" font-size="11.5">needs the editor in the loop</text>
  <g fill="rgba(240,244,255,.82)" font-size="13">
    <circle cx="458" cy="291" r="3" fill="#f59e0b"/><text x="470" y="295">.uasset · .umap are binary</text>
    <circle cx="458" cy="320" r="3" fill="#f59e0b"/><text x="470" y="324">no headless validate loop</text>
    <circle cx="458" cy="349" r="3" fill="#f59e0b"/><text x="470" y="353">scene edits need a live editor</text>
  </g>
  <text x="454" y="402" fill="#ffce80" font-size="14" font-weight="600">→ that's when you reach for an MCP</text>
</svg>
