  <rect x="88" y="314" width="264" height="44" rx="10" fill="rgba(244,63,94,.10)" stroke="rgba(244,63,94,.45)" stroke-width="1.5"/>
  <text x="112" y="342" fill="rgba(240,244,255,.85)" font-size="16" font-family="'SF Mono','Courier New',monospace">Object.002</text>
