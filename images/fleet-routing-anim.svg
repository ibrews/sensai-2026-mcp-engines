<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="fr-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fr-glow-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="routerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="60%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <radialGradient id="localGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </radialGradient>
    <radialGradient id="routerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <style>
      /* Router hub breathe */
      @keyframes routerBreathe {
        0%,100% { opacity:0.5; transform:scale(1); }
        50%     { opacity:0.95; transform:scale(1.1); }
      }
      .router-glow {
        transform-origin: 280px 250px;
        animation: routerBreathe 3.5s ease-in-out infinite;
      }

      /* ── Task A: enters from left → router → local fleet ── */
      /* 1. TASK enters top path: left edge → router */
      @keyframes taskAin {
        0%   { offset-distance:0%;  opacity:0; }
        6%   { opacity:1; }
        88%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      /* 2. TASK A exits router → local (top local node) */
      @keyframes taskAout {
        0%   { offset-distance:0%;  opacity:0; }
        5%   { opacity:1; }
        88%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }

      /* ── Task B: enters mid path → router → local fleet (lower) ── */
      @keyframes taskBin {
        0%   { offset-distance:0%;  opacity:0; }
        6%   { opacity:1; }
        88%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      @keyframes taskBout {
        0%   { offset-distance:0%;  opacity:0; }
        5%   { opacity:1; }
        88%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }

      /* ── Task C: enters → router → ESCALATES to Claude ── */
      @keyframes taskCin {
        0%   { offset-distance:0%;  opacity:0; }
        6%   { opacity:1; }
        88%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      @keyframes taskCout {
        0%   { offset-distance:0%;  opacity:0; }
        5%   { opacity:1; }
        88%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }

      /* offset-path dots */
      /* Task A in: (60,175) → (246,250) */
      .dot-a-in  {
        offset-path: path('M 60,175 L 246,250');
        animation: taskAin 2.8s ease-in infinite;
      }
      /* Task A out: router → local top (520,175) */
      .dot-a-out {
        offset-path: path('M 314,250 L 480,175');
        animation: taskAout 2.8s ease-in infinite 0.9s;
      }

      /* Task B in: (60,250) → (246,250) */
      .dot-b-in {
        offset-path: path('M 60,250 L 246,250');
        animation: taskBin 2.8s ease-in infinite 1.4s;
      }
      /* Task B out: router → local mid (520,260) */
      .dot-b-out {
        offset-path: path('M 314,250 L 480,260');
        animation: taskBout 2.8s ease-in infinite 2.3s;
      }

      /* Task C in: (60,325) → (246,250) */
      .dot-c-in {
        offset-path: path('M 60,325 L 246,250');
        animation: taskCin 3.5s ease-in infinite 0.7s;
      }
      /* Task C out (escalate): router → Claude box (520,390) */
      .dot-c-out {
        offset-path: path('M 314,265 C 360,310 430,360 480,390');
        animation: taskCout 3.5s ease-in infinite 1.7s;
      }

      /* Flowing dash on main routes */
      @keyframes flowRoute {
        0%   { stroke-dashoffset: 28; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes flowEscalate {
        0%   { stroke-dashoffset: 24; }
        100% { stroke-dashoffset: 0; }
      }
      .flow-local-top { stroke-dasharray: 9 6; animation: flowRoute 1.0s linear infinite; }
      .flow-local-mid { stroke-dasharray: 9 6; animation: flowRoute 1.0s linear infinite 0.33s; }
      .flow-escalate  { stroke-dasharray: 7 9; animation: flowEscalate 2.2s linear infinite; }

      /* "TASK" label pulse on task markers */
      @keyframes taskBlink {
        0%,100% { opacity:.9; }
        50%     { opacity:.45; }
      }
      .task-in  { animation: taskBlink 2.8s ease-in-out infinite; }
      .task-in2 { animation: taskBlink 2.8s ease-in-out infinite 1.4s; }
      .task-in3 { animation: taskBlink 3.5s ease-in-out infinite 0.7s; }

      /* local fleet node subtle pulse */
      @keyframes localPulse {
        0%,100% { opacity:1; }
        50%     { opacity:.7; }
      }
      .local-top { animation: localPulse 2.8s ease-in-out infinite; }
      .local-mid { animation: localPulse 2.8s ease-in-out infinite 1.4s; }

      /* Claude box gentle shimmer */
      @keyframes claudeShimmer {
        0%,100% { stroke-opacity:.55; }
        50%     { stroke-opacity:1; }
      }
      .claude-box { animation: claudeShimmer 3s ease-in-out infinite; }

      /* "ESCALATE" arrow label fade-pulse */
      @keyframes escalateLabel {
        0%,100% { opacity:.55; }
        50%     { opacity:1; }
      }
      .escalate-label { animation: escalateLabel 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="13" letter-spacing="3">FLEET-FIRST ROUTING — CHEAPEST CAPABLE MODEL WINS</text>

  <!-- ─── TASK INPUT COLUMN ─── -->
  <text x="80" y="135" text-anchor="middle" fill="rgba(240,244,255,.35)" font-size="10" font-weight="600" letter-spacing="1.5">TASKS</text>

  <!-- Task A marker -->
  <rect class="task-in" x="12" y="155" width="96" height="40" rx="10" fill="rgba(0,212,255,.1)" stroke="rgba(0,212,255,.4)" stroke-width="1.5"/>
  <text x="60" y="171" text-anchor="middle" fill="#b9f3ff" font-size="10.5" font-weight="600">batch export</text>
  <text x="60" y="186" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="9.5">routine task</text>

  <!-- Task B marker -->
  <rect class="task-in2" x="12" y="230" width="96" height="40" rx="10" fill="rgba(0,212,255,.1)" stroke="rgba(0,212,255,.4)" stroke-width="1.5"/>
  <text x="60" y="246" text-anchor="middle" fill="#b9f3ff" font-size="10.5" font-weight="600">code edit</text>
  <text x="60" y="261" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="9.5">structured</text>

  <!-- Task C marker (hard — escalates) -->
  <rect class="task-in3" x="12" y="305" width="96" height="40" rx="10" fill="rgba(167,139,250,.1)" stroke="rgba(167,139,250,.45)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="60" y="321" text-anchor="middle" fill="#c4b5fd" font-size="10.5" font-weight="600">novel arch</text>
  <text x="60" y="336" text-anchor="middle" fill="rgba(167,139,250,.5)" font-size="9.5">judgment call</text>

  <!-- Input lines to router (plain, low-opacity) -->
  <line x1="108" y1="175" x2="246" y2="250" stroke="rgba(240,244,255,.18)" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="108" y1="250" x2="246" y2="250" stroke="rgba(240,244,255,.18)" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="108" y1="325" x2="246" y2="250" stroke="rgba(167,139,250,.22)" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- ─── ROUTER HUB ─── -->
  <circle class="router-glow" cx="280" cy="250" r="68" fill="url(#routerGlow)"/>
  <circle cx="280" cy="250" r="50" fill="url(#routerGrad)" filter="url(#fr-glow)"/>
  <text x="280" y="245" text-anchor="middle" fill="#f0f9ff" font-size="14" font-weight="800">ROUTER</text>
  <text x="280" y="263" text-anchor="middle" fill="rgba(240,248,255,.65)" font-size="10.5">cheapest capable</text>
  <text x="280" y="292" text-anchor="middle" fill="#bae6fd" font-size="11" font-weight="600">model wins</text>

  <!-- ─── ROUTE LINES: router → local fleet ─── -->
  <!-- to local top -->
  <line class="flow-local-top" x1="328" y1="230" x2="480" y2="170" stroke="#4ade80" stroke-width="2.5" stroke-opacity=".75" filter="url(#fr-glow-sm)"/>
  <!-- to local mid -->
  <line class="flow-local-mid" x1="330" y1="252" x2="480" y2="265" stroke="#4ade80" stroke-width="2.5" stroke-opacity=".75" filter="url(#fr-glow-sm)"/>

  <!-- ─── LOCAL FLEET NODES ─── -->
  <!-- "most tasks" label -->
  <text x="610" y="128" text-anchor="middle" fill="rgba(240,244,255,.35)" font-size="10" font-weight="600" letter-spacing="1.5">LOCAL FLEET</text>

  <!-- local node 1: qwen3:8b -->
  <rect class="local-top" x="480" y="142" width="200" height="58" rx="14" fill="rgba(74,222,128,.1)" stroke="#4ade80" stroke-width="2" filter="url(#fr-glow-sm)"/>
  <text x="580" y="166" text-anchor="middle" fill="#bbf7d0" font-size="15" font-weight="700">qwen3:8b</text>
  <text x="580" y="184" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="11">local · zero cloud tokens</text>

  <!-- local node 2: qwen3-coder:30b -->
  <rect class="local-mid" x="480" y="236" width="200" height="58" rx="14" fill="rgba(74,222,128,.1)" stroke="#4ade80" stroke-width="2" filter="url(#fr-glow-sm)"/>
  <text x="580" y="260" text-anchor="middle" fill="#bbf7d0" font-size="15" font-weight="700">qwen3-coder:30b</text>
  <text x="580" y="278" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="11">local · zero cloud tokens</text>

  <!-- "zero cloud tokens" badge -->
  <rect x="504" y="308" width="152" height="22" rx="11" fill="rgba(74,222,128,.14)" stroke="rgba(74,222,128,.4)" stroke-width="1"/>
  <text x="580" y="323" text-anchor="middle" fill="#4ade80" font-size="10.5" font-weight="700" letter-spacing="0.5">✓ ZERO CLOUD TOKENS</text>

  <!-- ─── ESCALATION PATH: router → Claude ─── -->
  <path class="flow-escalate" d="M 314,265 C 360,310 430,360 480,390" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-opacity=".8" filter="url(#fr-glow-sm)"/>

  <!-- "ESCALATE" label on arc -->
  <text class="escalate-label" x="400" y="345" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600" transform="rotate(32 400 345)">escalate</text>

  <!-- ─── CLAUDE BOX ─── -->
  <rect class="claude-box" x="480" y="362" width="200" height="84" rx="14" fill="rgba(167,139,250,.12)" stroke="#a78bfa" stroke-width="2.2" filter="url(#fr-glow-sm)"/>
  <text x="580" y="390" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">Claude</text>
  <text x="580" y="408" text-anchor="middle" fill="#e9d5ff" font-size="13" font-weight="600">Sonnet / Opus</text>
  <text x="580" y="426" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="10.5">hard / open-ended · judgment</text>

  <!-- "WHEN JUDGMENT IS NEEDED" label -->
  <rect x="482" y="344" width="196" height="20" rx="10" fill="rgba(167,139,250,.15)" stroke="rgba(167,139,250,.4)" stroke-width="1"/>
  <text x="580" y="358" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-weight="700" letter-spacing="0.5">ONLY WHEN JUDGMENT NEEDED</text>

  <!-- ─── TRAVELLING DOTS ─── -->
  <!-- Task A: in (teal) then out (green to local top) -->
  <circle class="dot-a-in"  r="5.5" fill="#00d4ff" opacity="0"/>
  <circle class="dot-a-out" r="5.5" fill="#4ade80" opacity="0"/>
  <!-- Task B: in (teal) then out (green to local mid) -->
  <circle class="dot-b-in"  r="5.5" fill="#00d4ff" opacity="0"/>
  <circle class="dot-b-out" r="5.5" fill="#4ade80" opacity="0"/>
  <!-- Task C: in (purple) then out (purple escalate) -->
  <circle class="dot-c-in"  r="5" fill="#a78bfa" opacity="0"/>
  <circle class="dot-c-out" r="5" fill="#a78bfa" opacity="0"/>

  <!-- ─── BOTTOM LEGEND ─── -->
  <line x1="128" y1="462" x2="168" y2="462" stroke="#4ade80" stroke-width="2.5"/>
  <text x="178" y="467" fill="rgba(240,244,255,.55)" font-size="11">local fleet — most tasks</text>

  <line x1="358" y1="462" x2="398" y2="462" stroke="#a78bfa" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="408" y="467" fill="rgba(240,244,255,.55)" font-size="11">Claude — hard / judgment only</text>

  <!-- Bottom tagline -->
  <text x="410" y="490" text-anchor="middle" fill="rgba(240,244,255,.3)" font-size="12" font-style="italic">save the budget · spend it only where judgment is needed</text>
</svg>
