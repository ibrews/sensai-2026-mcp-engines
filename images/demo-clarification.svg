<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="gdc" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="adc" markerWidth="11" markerHeight="11" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7.5,3.2 L0,6.4 Z" fill="#f59e0b"/></marker>
    <linearGradient id="ldc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d4ff"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <text x="410" y="50" text-anchor="middle" fill="rgba(240,244,255,.55)" font-size="16" letter-spacing="3">GOOD AI KNOWS WHAT IT DOESN&#8217;T KNOW</text>

  <!-- step 1: vague prompt -->
  <rect x="40" y="248" width="222" height="124" rx="16" fill="rgba(240,244,255,.04)" stroke="rgba(240,244,255,.30)" stroke-width="2"/>
  <text x="151" y="288" text-anchor="middle" fill="#f0f4ff" font-size="20" font-weight="700">Vague prompt</text>
  <text x="151" y="322" text-anchor="middle" fill="rgba(240,244,255,.6)" font-size="15">&#8220;make it look</text>
  <text x="151" y="344" text-anchor="middle" fill="rgba(240,244,255,.6)" font-size="15">better&#8221;</text>

  <!-- arrow 1 -->
  <line x1="266" y1="310" x2="296" y2="310" stroke="url(#ldc)" stroke-width="3.5" marker-end="url(#adc)"/>

  <!-- step 2: highlighted -->
  <rect x="300" y="240" width="222" height="140" rx="18" fill="rgba(245,158,11,.12)" stroke="#f59e0b" stroke-width="3" filter="url(#gdc)"/>
  <text x="411" y="282" text-anchor="middle" fill="#ffe9c2" font-size="20" font-weight="700">AI asks ONE</text>
  <text x="411" y="306" text-anchor="middle" fill="#ffe9c2" font-size="20" font-weight="700">question</text>
  <text x="411" y="338" text-anchor="middle" fill="rgba(240,244,255,.6)" font-size="14.5">&#8220;brighter, or</text>
  <text x="411" y="358" text-anchor="middle" fill="rgba(240,244,255,.6)" font-size="14.5">more colorful?&#8221;</text>

  <!-- badge near step 2 -->
  <rect x="306" y="196" width="210" height="30" rx="15" fill="rgba(245,158,11,.22)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="411" y="216" text-anchor="middle" fill="#ffe9c2" font-size="13" font-weight="600" letter-spacing="1">asks before it breaks</text>

  <!-- arrow 2 -->
  <line x1="526" y1="310" x2="556" y2="310" stroke="#f59e0b" stroke-width="3.5" marker-end="url(#adc)"/>

  <!-- step 3: specific result -->
  <rect x="560" y="248" width="222" height="124" rx="16" fill="rgba(0,212,255,.10)" stroke="#00d4ff" stroke-width="2.5" filter="url(#gdc)"/>
  <text x="671" y="296" text-anchor="middle" fill="#e9fbff" font-size="20" font-weight="700">Specific,</text>
  <text x="671" y="320" text-anchor="middle" fill="#e9fbff" font-size="20" font-weight="700">correct result</text>
  <text x="671" y="350" text-anchor="middle" fill="rgba(240,244,255,.55)" font-size="14">&#10003; done right, once</text>

  <text x="410" y="566" text-anchor="middle" fill="rgba(240,244,255,.62)" font-size="16">Asking before breaking is a feature, not a failure.</text>
</svg>
