<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 640" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="gsl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="asl" markerWidth="11" markerHeight="11" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7.5,3.2 L0,6.4 Z" fill="#f43f5e"/></marker>
  </defs>

  <text x="410" y="50" text-anchor="middle" fill="rgba(240,244,255,.55)" font-size="16" letter-spacing="3">OPEN SOURCE &#183; BATTLE-TESTED</text>

  <!-- server cards grid -->
  <!-- blender-mcp (the mature one) -->
  <rect x="64" y="96" width="220" height="96" rx="16" fill="rgba(244,63,94,.12)" stroke="#f43f5e" stroke-width="3" filter="url(#gsl)"/>
  <text x="174" y="134" text-anchor="middle" fill="#ffe1e7" font-size="20" font-weight="700">blender-mcp</text>
  <text x="174" y="160" text-anchor="middle" fill="rgba(240,244,255,.6)" font-size="13">most mature</text>
  <rect x="120" y="170" width="108" height="22" rx="11" fill="rgba(244,63,94,.22)" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="174" y="185" text-anchor="middle" fill="#ffe1e7" font-size="11.5" font-weight="600" letter-spacing="1">most mature</text>

  <rect x="304" y="96" width="220" height="96" rx="16" fill="rgba(244,63,94,.08)" stroke="rgba(244,63,94,.55)" stroke-width="2.5"/>
  <text x="414" y="134" text-anchor="middle" fill="#ffd7df" font-size="19" font-weight="700">community fork</text>
  <text x="414" y="160" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="13">patched + extended</text>

  <rect x="544" y="96" width="220" height="96" rx="16" fill="rgba(244,63,94,.08)" stroke="rgba(244,63,94,.55)" stroke-width="2.5"/>
  <text x="654" y="128" text-anchor="middle" fill="#ffd7df" font-size="18" font-weight="700">your in-house</text>
  <text x="654" y="150" text-anchor="middle" fill="#ffd7df" font-size="18" font-weight="700">add-on</text>
  <text x="654" y="174" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="13">studio-specific</text>

  <rect x="184" y="208" width="220" height="96" rx="16" fill="rgba(244,63,94,.08)" stroke="rgba(244,63,94,.55)" stroke-width="2.5"/>
  <text x="294" y="246" text-anchor="middle" fill="#ffd7df" font-size="19" font-weight="700">python-native</text>
  <text x="294" y="272" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="13">thin scripting layer</text>

  <rect x="424" y="208" width="220" height="96" rx="16" fill="rgba(244,63,94,.08)" stroke="rgba(244,63,94,.55)" stroke-width="2.5"/>
  <text x="534" y="246" text-anchor="middle" fill="#ffd7df" font-size="19" font-weight="700">&#8230; and more</text>
  <text x="534" y="272" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="13">the field keeps growing</text>

  <!-- mapping: Blender Python API ~ 1:1 to MCP calls -->
  <rect x="120" y="384" width="260" height="96" rx="16" fill="rgba(240,244,255,.04)" stroke="rgba(240,244,255,.28)" stroke-width="2"/>
  <text x="250" y="422" text-anchor="middle" fill="#f0f4ff" font-size="18" font-weight="700">Blender Python API</text>
  <text x="250" y="448" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="13">the surface you already know</text>

  <rect x="440" y="384" width="260" height="96" rx="16" fill="rgba(244,63,94,.10)" stroke="#f43f5e" stroke-width="2.5" filter="url(#gsl)"/>
  <text x="570" y="422" text-anchor="middle" fill="#ffe1e7" font-size="18" font-weight="700">MCP calls</text>
  <text x="570" y="448" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="13">what the AI invokes</text>

  <!-- ~ 1:1 arrows -->
  <line x1="382" y1="420" x2="438" y2="420" stroke="#f43f5e" stroke-width="3" marker-end="url(#asl)"/>
  <line x1="438" y1="446" x2="382" y2="446" stroke="rgba(244,63,94,.55)" stroke-width="2.5" marker-end="url(#asl)"/>
  <text x="410" y="500" text-anchor="middle" fill="rgba(240,244,255,.6)" font-size="15" font-weight="600">&#8776; 1:1</text>

  <text x="410" y="568" text-anchor="middle" fill="rgba(240,244,255,.62)" font-size="16">Hit a wall? Open source means you add what&#8217;s missing.</text>
</svg>
