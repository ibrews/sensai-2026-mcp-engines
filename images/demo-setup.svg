<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="gds" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ads" markerWidth="11" markerHeight="11" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7.5,3.2 L0,6.4 Z" fill="#f59e0b"/></marker>
    <linearGradient id="lds" x1="266" y1="348" x2="296" y2="348" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d4ff"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <text x="410" y="50" text-anchor="middle" fill="rgba(240,244,255,.55)" font-size="16" letter-spacing="3">WHAT YOU&#8217;RE LOOKING AT</text>

  <!-- dashed Claude standby chip -->
  <rect x="290" y="120" width="240" height="64" rx="16" fill="rgba(167,139,250,.08)" stroke="#a78bfa" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="410" y="148" text-anchor="middle" fill="#efe9ff" font-size="16" font-weight="700">Claude</text>
  <text x="410" y="170" text-anchor="middle" fill="rgba(240,244,255,.55)" font-size="13">on standby for the hard asks</text>

  <!-- dotted connector from Claude down to the local model -->
  <line x1="410" y1="184" x2="410" y2="276" stroke="#a78bfa" stroke-width="2" stroke-dasharray="3 6" opacity=".8"/>

  <!-- pipeline: local model -->
  <rect x="44" y="296" width="220" height="104" rx="16" fill="rgba(0,212,255,.10)" stroke="#00d4ff" stroke-width="2.5" filter="url(#gds)"/>
  <text x="154" y="338" text-anchor="middle" fill="#e9fbff" font-size="21" font-weight="700">LOCAL MODEL</text>
  <text x="154" y="366" text-anchor="middle" fill="rgba(240,244,255,.6)" font-size="14">Ollama</text>

  <!-- typed MCP tools -->
  <rect x="300" y="296" width="220" height="104" rx="16" fill="rgba(245,158,11,.10)" stroke="#f59e0b" stroke-width="2.5" filter="url(#gds)"/>
  <text x="410" y="338" text-anchor="middle" fill="#ffe9c2" font-size="21" font-weight="700">TYPED MCP</text>
  <text x="410" y="364" text-anchor="middle" fill="#ffe9c2" font-size="21" font-weight="700">TOOLS</text>

  <!-- blender -->
  <rect x="556" y="296" width="220" height="104" rx="16" fill="rgba(244,63,94,.10)" stroke="#f43f5e" stroke-width="2.5" filter="url(#gds)"/>
  <text x="666" y="338" text-anchor="middle" fill="#ffe1e7" font-size="21" font-weight="700">BLENDER</text>
  <text x="666" y="366" text-anchor="middle" fill="rgba(240,244,255,.6)" font-size="14">MCP server running</text>

  <!-- pipeline arrows -->
  <line x1="266" y1="348" x2="296" y2="348" stroke="url(#lds)" stroke-width="3.5" marker-end="url(#ads)"/>
  <line x1="522" y1="348" x2="552" y2="348" stroke="#f59e0b" stroke-width="3.5" marker-end="url(#ads)"/>

  <!-- IN -> OUT label under the whole thing -->
  <text x="410" y="468" text-anchor="middle" fill="rgba(240,244,255,.7)" font-size="17" font-weight="600">natural language IN&#160;&#160;&#8594;&#160;&#160;viewport change OUT</text>

  <text x="410" y="566" text-anchor="middle" fill="rgba(240,244,255,.62)" font-size="16">Plain language in, a visible change in the viewport out.</text>
</svg>
