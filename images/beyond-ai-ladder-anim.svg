<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="lad-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lad-glow-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      /* =============================================================
         CRITICAL: every element is VISIBLE BY DEFAULT (base opacity:1).
         Animations add motion/emphasis ONLY — none gate base visibility,
         and nothing relies on animation-fill-mode to bring content in.
         This SVG is rendered in the deck as an img element, where CSS
         animations DO NOT RUN — so it must read perfectly as a STATIC
         frame. Any element parked at opacity:0 awaiting a reveal would
         be permanently invisible when loaded as an img.
         NOTE: do NOT put angle-bracket tag literals in comments — when
         the SVG is loaded via an img element it is parsed as strict XML,
         and a stray start-tag in a comment breaks the whole document.
         ============================================================= */

      /* ── Horizontal dash flow on the two "live AI" rungs (motion only) ── */
      @keyframes flowRung {
        from { stroke-dashoffset: 32; }
        to   { stroke-dashoffset: 0; }
      }
      .flow-r1 { stroke-dasharray: 10 7; animation: flowRung 1.0s linear infinite; }
      .flow-r2 { stroke-dasharray: 10 7; animation: flowRung 1.0s linear infinite 0.33s; }

      /* ── Descending dots along the left rail.
            These are decorative accents (NOT content); they legitimately
            start at opacity:0 because they only exist while travelling. ── */
      @keyframes dropDot {
        0%   { offset-distance:0%;  opacity:0; }
        8%   { opacity:1; }
        85%  { opacity:1; }
        100% { offset-distance:100%; opacity:0; }
      }
      .drop-dot-a {
        offset-path: path('M 120,100 L 120,470');
        animation: dropDot 2.8s ease-in infinite;
      }
      .drop-dot-b {
        offset-path: path('M 120,100 L 120,470');
        animation: dropDot 2.8s ease-in infinite 1.4s;
      }

      /* ── Stroke-opacity pulse on rung boxes (oscillates .65↔1, never hides) ── */
      @keyframes boxPulse {
        0%,100% { stroke-opacity:0.65; }
        50%     { stroke-opacity:1; }
      }
      .box-r1 { animation: boxPulse 3s ease-in-out infinite; }
      .box-r2 { animation: boxPulse 3s ease-in-out infinite 1s; }
      .box-r3-chip { animation: boxPulse 3s ease-in-out infinite 2s; }

      /* ── "less AI" arrow label — opacity oscillates .45↔.8, never 0 ── */
      @keyframes arrowLabel {
        0%,100% { opacity:.45; }
        50%      { opacity:.8; }
      }
      .arr-label { animation: arrowLabel 3.5s ease-in-out infinite; }

      /* ── AI node glow pulse on Rung 1 (full presence; base opacity in markup) ── */
      @keyframes nodePulse {
        0%,100% { opacity:.7; }
        50%     { opacity:1; }
      }
      .node-r1 { animation: nodePulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- ═══ TITLE ═══ -->
  <text x="410" y="36" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="13" letter-spacing="3">BEYOND AI — THE COST-DOWN LADDER</text>

  <!-- ═══ LADDER RAILS ═══ -->
  <line x1="120" y1="95" x2="120" y2="468" stroke="rgba(240,244,255,.12)" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="700" y1="95" x2="700" y2="468" stroke="rgba(240,244,255,.12)" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- ═══ DESCEND ARROW + LABEL ═══ -->
  <line x1="755" y1="105" x2="755" y2="452" stroke="rgba(240,244,255,.2)" stroke-width="1.5" stroke-dasharray="5 5"/>
  <polygon points="755,466 748,446 762,446" fill="rgba(240,244,255,.25)"/>
  <text class="arr-label" x="780" y="290" text-anchor="middle" fill="rgba(240,244,255,.55)" font-size="11" font-weight="600" letter-spacing="1" transform="rotate(90 780 290)">less AI at runtime →</text>

  <!-- ═══ TRAVELLING DOTS (decorative accents — opacity:0 base is intentional) ═══ -->
  <circle class="drop-dot-a" r="5" fill="#00d4ff" opacity="0"/>
  <circle class="drop-dot-b" r="5" fill="#a78bfa" opacity="0"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- RUNG 1 — FRONTIER                                    -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g class="rung1">
    <line class="flow-r1" x1="122" y1="145" x2="698" y2="145" stroke="#a78bfa" stroke-width="2.5" stroke-opacity=".7" filter="url(#lad-glow)"/>

    <rect class="box-r1" x="160" y="108" width="480" height="74" rx="14"
          fill="rgba(167,139,250,.12)" stroke="#a78bfa" stroke-width="2" filter="url(#lad-glow-sm)"/>

    <!-- Rung badge -->
    <rect x="160" y="90" width="80" height="20" rx="10" fill="rgba(167,139,250,.2)" stroke="rgba(167,139,250,.5)" stroke-width="1"/>
    <text x="200" y="104" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-weight="700" letter-spacing="1">RUNG 1</text>

    <text x="400" y="138" text-anchor="middle" fill="#c4b5fd" font-size="19" font-weight="800">FRONTIER</text>
    <text x="400" y="160" text-anchor="middle" fill="#e9d5ff" font-size="13" font-weight="600">Claude Sonnet / Opus</text>
    <text x="400" y="176" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="10.5">most capable · cloud · highest cost per call</text>

    <!-- AI presence: full glow -->
    <circle class="node-r1" cx="140" cy="145" r="8" fill="#a78bfa" opacity=".85" filter="url(#lad-glow-sm)"/>
    <circle class="node-r1" cx="680" cy="145" r="8" fill="#a78bfa" opacity=".85" filter="url(#lad-glow-sm)"/>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- RUNG 2 — LOCAL FLEET                                 -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g class="rung2">
    <line class="flow-r2" x1="122" y1="290" x2="698" y2="290" stroke="#00d4ff" stroke-width="2.5" stroke-opacity=".55" filter="url(#lad-glow)"/>

    <rect class="box-r2" x="160" y="253" width="480" height="74" rx="14"
          fill="rgba(0,212,255,.09)" stroke="#00d4ff" stroke-width="2" filter="url(#lad-glow-sm)"/>

    <!-- Rung badge -->
    <rect x="160" y="235" width="80" height="20" rx="10" fill="rgba(0,212,255,.15)" stroke="rgba(0,212,255,.45)" stroke-width="1"/>
    <text x="200" y="249" text-anchor="middle" fill="#b9f3ff" font-size="9.5" font-weight="700" letter-spacing="1">RUNG 2</text>

    <text x="400" y="282" text-anchor="middle" fill="#b9f3ff" font-size="19" font-weight="800">LOCAL FLEET</text>
    <text x="400" y="305" text-anchor="middle" fill="#e0f9ff" font-size="13" font-weight="600">qwen3:8b · qwen3-coder:30b</text>
    <text x="400" y="321" text-anchor="middle" fill="rgba(240,244,255,.45)" font-size="10.5">on-device · cheap · zero cloud tokens</text>

    <!-- AI presence: half (dimmer nodes) -->
    <circle cx="140" cy="290" r="8" fill="#00d4ff" opacity=".38" filter="url(#lad-glow-sm)"/>
    <circle cx="680" cy="290" r="8" fill="#00d4ff" opacity=".38" filter="url(#lad-glow-sm)"/>

    <!-- badge -->
    <rect x="310" y="330" width="200" height="20" rx="10" fill="rgba(0,212,255,.1)" stroke="rgba(0,212,255,.3)" stroke-width="1"/>
    <text x="410" y="344" text-anchor="middle" fill="#4af0ff" font-size="10" font-weight="700" letter-spacing=".5">✓ ZERO CLOUD TOKENS</text>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- RUNG 3 — NO AI / DETERMINISTIC                       -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g class="rung3">
    <!-- rung line: dashed, amber, no flow animation — signals "no live AI" -->
    <line x1="122" y1="408" x2="698" y2="408" stroke="rgba(245,158,11,.35)" stroke-width="2" stroke-dasharray="8 10"/>

    <rect x="160" y="371" width="480" height="74" rx="14"
          fill="rgba(245,158,11,.07)" stroke="rgba(245,158,11,.38)" stroke-width="1.5" stroke-dasharray="7 5"/>

    <!-- Rung badge -->
    <rect x="160" y="353" width="80" height="20" rx="10" fill="rgba(245,158,11,.15)" stroke="rgba(245,158,11,.45)" stroke-width="1"/>
    <text x="200" y="367" text-anchor="middle" fill="#fde68a" font-size="9.5" font-weight="700" letter-spacing="1">RUNG 3</text>

    <text x="400" y="396" text-anchor="middle" fill="#fbbf24" font-size="17" font-weight="800">NO AI AT RUNTIME</text>
    <text x="400" y="417" text-anchor="middle" fill="rgba(240,244,255,.55)" font-size="12" font-weight="600">Deterministic tools — built by AI, run without it</text>
    <text x="400" y="434" text-anchor="middle" fill="rgba(240,244,255,.35)" font-size="10">zero tokens per call · consistent · fast</text>

    <!-- AI presence: GONE — crossed-out circles -->
    <circle cx="140" cy="408" r="8" fill="none" stroke="rgba(240,244,255,.18)" stroke-width="1.5"/>
    <line x1="133" y1="401" x2="147" y2="415" stroke="rgba(240,244,255,.22)" stroke-width="1.5"/>
    <line x1="147" y1="401" x2="133" y2="415" stroke="rgba(240,244,255,.22)" stroke-width="1.5"/>
    <circle cx="680" cy="408" r="8" fill="none" stroke="rgba(240,244,255,.18)" stroke-width="1.5"/>
    <line x1="673" y1="401" x2="687" y2="415" stroke="rgba(240,244,255,.22)" stroke-width="1.5"/>
    <line x1="687" y1="401" x2="673" y2="415" stroke="rgba(240,244,255,.22)" stroke-width="1.5"/>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- TOOL CHIPS                                           -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Chip A: Blueprint Auto-Layout -->
  <g class="chip-a">
    <rect class="box-r3-chip" x="128" y="447" width="180" height="46" rx="12"
          fill="rgba(244,63,94,.1)" stroke="rgba(244,63,94,.5)" stroke-width="1.5"/>
    <text x="218" y="466" text-anchor="middle" fill="#fb7185" font-size="11" font-weight="700">Blueprint Auto-Layout</text>
    <text x="218" y="483" text-anchor="middle" fill="rgba(240,244,255,.4)" font-size="9.5">Blender · graph wiring · zero AI</text>
  </g>

  <!-- Chip B: Forage -->
  <g class="chip-b">
    <rect class="box-r3-chip" x="321" y="447" width="178" height="46" rx="12"
          fill="rgba(0,212,255,.09)" stroke="rgba(0,212,255,.45)" stroke-width="1.5"/>
    <text x="410" y="466" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="700">Forage</text>
    <text x="410" y="483" text-anchor="middle" fill="rgba(240,244,255,.4)" font-size="9.5">Godot · asset pipeline · zero AI</text>
  </g>

  <!-- Chip C: UnReality Kit -->
  <g class="chip-c">
    <rect class="box-r3-chip" x="512" y="447" width="180" height="46" rx="12"
          fill="rgba(245,158,11,.1)" stroke="rgba(245,158,11,.45)" stroke-width="1.5"/>
    <text x="602" y="466" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">UnReality Kit</text>
    <text x="602" y="483" text-anchor="middle" fill="rgba(240,244,255,.4)" font-size="9.5">Unreal → RealityKit · zero AI</text>
  </g>

  <!-- ═══ TAGLINE ═══ -->
  <text class="tagline" x="410" y="514" text-anchor="middle" fill="rgba(240,244,255,.65)" font-size="12.5" font-style="italic">"Use AI to build the tools that no longer need it."</text>

</svg>
