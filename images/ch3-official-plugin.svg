<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="gop" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="aop" markerWidth="10" markerHeight="10" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="rgba(240,244,255,.6)"/></marker>
  </defs>

  <text x="410" y="46" text-anchor="middle" fill="rgba(240,244,255,.55)" font-size="16" letter-spacing="3">MANY SERVERS &#183; ONE PROTOCOL</text>

  <!-- UNREAL EDITOR (left) -->
  <rect x="44" y="250" width="172" height="120" rx="20" fill="rgba(245,158,11,.10)" stroke="#f59e0b" stroke-width="2.5" filter="url(#gop)"/>
  <text x="130" y="304" text-anchor="middle" fill="#ffe9c2" font-size="21" font-weight="700">UNREAL</text>
  <text x="130" y="330" text-anchor="middle" fill="#ffe9c2" font-size="21" font-weight="700">EDITOR</text>

  <!-- ANY MCP CLIENT (right) -->
  <rect x="604" y="250" width="172" height="120" rx="20" fill="rgba(167,139,250,.12)" stroke="#a78bfa" stroke-width="2.5" filter="url(#gop)"/>
  <text x="690" y="298" text-anchor="middle" fill="#efe9ff" font-size="19" font-weight="700">ANY MCP</text>
  <text x="690" y="320" text-anchor="middle" fill="#efe9ff" font-size="19" font-weight="700">CLIENT</text>
  <text x="690" y="344" text-anchor="middle" fill="rgba(240,244,255,.55)" font-size="12">Claude &#183; local model</text>

  <!-- connecting arrows (solid so they actually render) -->
  <line x1="216" y1="310" x2="290" y2="310" stroke="rgba(240,244,255,.5)" stroke-width="3" marker-end="url(#aop)"/>
  <line x1="530" y1="310" x2="600" y2="310" stroke="rgba(240,244,255,.5)" stroke-width="3" marker-end="url(#aop)"/>

  <text x="410" y="120" text-anchor="middle" fill="rgba(240,244,255,.5)" font-size="12.5" letter-spacing="1.5">PICK ANY &#8212; THEY ALL SPEAK MCP</text>

  <!-- Epic Official -->
  <rect x="294" y="138" width="232" height="50" rx="12" fill="rgba(245,158,11,.10)" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="310" y="160" fill="#ffe9c2" font-size="15" font-weight="700">Epic Official</text>
  <text x="510" y="158" text-anchor="end" fill="rgba(240,244,255,.5)" font-size="11.5">UE 5.8+</text>
  <text x="310" y="177" fill="rgba(245,158,11,.6)" font-size="10.5">built-in &#183; one option, not the first</text>

  <!-- NeoStack -->
  <rect x="294" y="200" width="232" height="50" rx="12" fill="rgba(0,212,255,.08)" stroke="#00d4ff" stroke-width="1.8"/>
  <text x="310" y="222" fill="#e9fbff" font-size="15" font-weight="700">NeoStack</text>
  <text x="510" y="220" text-anchor="end" fill="rgba(240,244,255,.5)" font-size="11.5">commercial</text>
  <text x="310" y="239" fill="rgba(0,212,255,.55)" font-size="10.5">Agent Integration Kit &#183; Blueprint-first</text>

  <!-- ue-mcp.com -->
  <rect x="294" y="262" width="232" height="50" rx="12" fill="rgba(167,139,250,.10)" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="310" y="284" fill="#efe9ff" font-size="15" font-weight="700">ue-mcp.com</text>
  <text x="510" y="282" text-anchor="end" fill="rgba(240,244,255,.5)" font-size="11.5">hosted</text>
  <text x="310" y="301" fill="rgba(167,139,250,.6)" font-size="10.5">compare every option &#183; widest coverage</text>

  <!-- Open source -->
  <rect x="294" y="324" width="232" height="50" rx="12" fill="rgba(244,63,94,.08)" stroke="#f43f5e" stroke-width="1.8"/>
  <text x="310" y="346" fill="#ffd7df" font-size="15" font-weight="700">Open source</text>
  <text x="510" y="344" text-anchor="end" fill="rgba(240,244,255,.5)" font-size="11.5">free</text>
  <text x="310" y="363" fill="rgba(244,63,94,.55)" font-size="10.5">chongdashu, flopperam &amp; more</text>

  <!-- Your own -->
  <rect x="294" y="386" width="232" height="50" rx="12" fill="rgba(90,150,90,.16)" stroke="#7bbf7b" stroke-width="1.8"/>
  <text x="310" y="408" fill="#dff5df" font-size="15" font-weight="700">Your own</text>
  <text x="510" y="406" text-anchor="end" fill="rgba(240,244,255,.5)" font-size="11.5">in-house</text>
  <text x="310" y="425" fill="rgba(123,191,123,.65)" font-size="10.5">we built ours: scene + character + batch</text>

  <text x="410" y="486" text-anchor="middle" fill="rgba(240,244,255,.62)" font-size="16">Epic&#8217;s official is just one lane &#8212; pick the plugin that fits your loop.</text>
  <text x="410" y="512" text-anchor="middle" fill="rgba(240,244,255,.4)" font-size="13">Same editor, same client &#8212; only the server in the middle changes.</text>
</svg>
