<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Spatial Deck default favicon. A stylized teal "spotlight" with a pixel-art-style "S"
       glyph. Forks should regenerate this with their own title via tools/gen-favicon.py. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0a1530"/>
      <stop offset="100%" stop-color="#03060f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity=".35"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>
  <!-- Pixel-block "S" — 3 horizontal bars + 2 vertical connectors -->
  <g fill="#00d4ff" shape-rendering="crispEdges">
    <rect x="18" y="16" width="28" height="6"/>
    <rect x="18" y="22" width="6"  height="8"/>
    <rect x="18" y="29" width="28" height="6"/>
    <rect x="40" y="35" width="6"  height="8"/>
    <rect x="18" y="42" width="28" height="6"/>
  </g>
  <!-- Soft inner glow on the "S" -->
  <g fill="#7be8ff" shape-rendering="crispEdges" opacity=".55">
    <rect x="18" y="16" width="28" height="2"/>
    <rect x="18" y="29" width="28" height="2"/>
    <rect x="18" y="42" width="28" height="2"/>
  </g>
</svg>
