<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- AI+MCP cube favicon: isometric cube (3 engines) with amber AI node at top vertex -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0a1530"/>
      <stop offset="100%" stop-color="#03060f"/>
    </radialGradient>
    <radialGradient id="glow" cx="32" cy="16" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <!-- Ambient glow from AI node -->
  <circle cx="32" cy="16" r="20" fill="url(#glow)"/>
  <!-- Isometric cube — left face -->
  <polygon points="14,27 32,37 32,54 14,44" fill="#0099bb"/>
  <!-- Isometric cube — right face -->
  <polygon points="50,27 32,37 32,54 50,44" fill="#006d88"/>
  <!-- Isometric cube — top face (brightest) -->
  <polygon points="32,16 50,27 32,37 14,27" fill="#00d4ff"/>
  <!-- Edge highlight lines -->
  <polyline points="32,16 50,27 50,44 32,54 14,44 14,27 32,16"
    fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linejoin="round"/>
  <line x1="32" y1="37" x2="32" y2="16" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <line x1="32" y1="37" x2="14" y2="27" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
  <line x1="32" y1="37" x2="50" y2="27" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
  <!-- AI node — amber, top vertex -->
  <circle cx="32" cy="16" r="7" fill="#f59e0b" opacity="0.2"/>
  <circle cx="32" cy="16" r="4.5" fill="#f59e0b" opacity="0.95"/>
  <circle cx="32" cy="16" r="2" fill="#fff" opacity="0.7"/>
  <!-- Engine nodes — one per corner (left, right, bottom) -->
  <circle cx="14" cy="27" r="3" fill="#00d4ff" opacity="0.9"/>
  <circle cx="50" cy="27" r="3" fill="#00d4ff" opacity="0.9"/>
  <circle cx="32" cy="54" r="3" fill="#00d4ff" opacity="0.75"/>
  <!-- Connection lines: AI node → each engine node -->
  <line x1="32" y1="16" x2="14" y2="27" stroke="#f59e0b" stroke-width="1.2" opacity="0.55"/>
  <line x1="32" y1="16" x2="50" y2="27" stroke="#f59e0b" stroke-width="1.2" opacity="0.55"/>
</svg>
