function _visibleSlideIdxs(){
  const out=[];
  for(let i=0;i<allSlides.length;i++){
    const sl=allSlides[i];
    if(sl.dataset.hidden==='1')continue;
    if(sl.dataset.type==='settings')continue;
    out.push(i);
  }
  return out;
}
function _updateSlidePreview(){
  const panel=document.getElementById('na-slide-preview');
  if(!panel||!panel.classList.contains('open'))return;
  const url=_slideThumbs[current];
  const title=getSlideTitle(current);
  if(url){panel.innerHTML=`<div class="na-sp-label">Current Slide</div><img src="${url}" alt="${title}">`;}
  else{panel.innerHTML=`<div class="na-sp-label">Current Slide</div><div class="na-sp-placeholder">${title||'Slide '+(current+1)}<br><span style="font-size:.65rem;opacity:.6">Calibrate to see thumbnail</span></div>`;}
}
function _renderTopbar(){
  if(!document.body.classList.contains('notes-mode'))return;
  const idx=current;const total=allSlides.length;
  const visible=_visibleSlideIdxs();
  const pos=visible.indexOf(idx);
  const num=pos>=0?(pos+1):'-';
  document.getElementById('na-slide-num').textContent=String(num).padStart(2,'0')+'/'+String(visible.length).padStart(2,'0');
  // Next preview — find next visible non-settings slide
  let nextIdx=idx;
  for(let i=1;i<=total;i++){
    const cand=(idx+i)%total;
    const sl=allSlides[cand];
    if(sl.dataset.hidden==='1'||sl.dataset.type==='settings')continue;
    nextIdx=cand;break;
  }
  const nt=document.getElementById('na-next-title');if(nt)nt.textContent=nextIdx!==idx?(getSlideTitle(nextIdx)||'(slide '+(nextIdx+1)+')'):'(end of deck)';
  const thumb=document.getElementById('na-next-thumb');
  if(thumb){
    const url=_slideThumbs[nextIdx];
    if(url){thumb.style.backgroundImage='url('+url+')';thumb.textContent='';}
    else{thumb.style.backgroundImage='';thumb.textContent='NEXT';}
  }
  // Pacing
  _updatePacingDisplay();
  _updateSlidePreview();
}
function _updatePacingDisplay(){
  const elapsedSec=_talkStartTime?Math.floor((Date.now()-_talkStartTime)/1000):0;
  document.getElementById('na-elapsed').textContent=_fmtMS(elapsedSec);
  const targetISO=_notesMeta.target_finish||_notesView.target;
  const tLine=document.getElementById('na-target-line');
  const proj=document.getElementById('na-projected');
  const dot=document.getElementById('na-pace-dot');
  if(!_talkStartTime){
    if(targetISO){const td=new Date(targetISO);if(!isNaN(td)){tLine.textContent='Target: '+_fmtClock(td);tLine.className='na-target';}else{tLine.textContent='no target set';}}
    else tLine.textContent='no target set';
    proj.textContent='';dot.className='na-pace-dot';return;
  }
  const remainEst=calcEstimateFromIdx(current);
  const projectedFinish=new Date(Date.now()+remainEst*1000);
  proj.textContent='Projected: '+_fmtClock(projectedFinish);
  if(targetISO){
    const td=new Date(targetISO);
    if(!isNaN(td)){
      tLine.textContent='Target: '+_fmtClock(td);
      const diffMin=(projectedFinish.getTime()-td.getTime())/60000;
      let cls='';
      if(diffMin>2)cls='warn';
      if(diffMin>5)cls='late';
      if(diffMin<-2)cls='warn'; // also flag if way ahead
      tLine.className='na-target '+(diffMin>5?'late':diffMin>2?'warn':'');
      proj.className='na-projected '+(diffMin>5?'late':diffMin>2?'warn':'');
      dot.className='na-pace-dot'+(diffMin>5?' late':diffMin>2?' warn':'');
    }
  }else{tLine.textContent='no target set';dot.className='na-pace-dot';}
}

// Nav buttons (with light debounce — single tap, no rapid double-fire)
let _tapLastFire=0;
function _tapGuard(){const now=Date.now();if(now-_tapLastFire<200)return false;_tapLastFire=now;return true;}
function _setupNavButtons(){

// Calibration sweep — capture video durations + slide thumbnails
async function _preloadAllImages(){
  const imgs=Array.from(document.querySelectorAll('#deck img'));
  await Promise.all(imgs.map(img=>{
    if(img.complete&&img.naturalWidth>0)return Promise.resolve();
    img.loading='eager';
    return new Promise(res=>{
      let done=false;const fin=()=>{if(done)return;done=true;res();};
      img.addEventListener('load',fin,{once:true});
      img.addEventListener('error',fin,{once:true});
      setTimeout(fin,4000);
      // Re-trigger load if needed
      if(!img.src){fin();return;}
      const orig=img.src;img.src='';img.src=orig;
    });
  }));
}
async function _preloadVideoFrames(){
  const vids=Array.from(document.querySelectorAll('#deck video'));
  await Promise.all(vids.map(v=>{
    if(v.readyState>=2)return Promise.resolve();
    return new Promise(res=>{
      let done=false;const fin=()=>{if(done)return;done=true;res();};
      v.addEventListener('loadeddata',fin,{once:true});
      v.addEventListener('error',fin,{once:true});
      setTimeout(fin,5000);
      if(v.preload==='none')v.preload='metadata';
      try{v.load();}catch(_){}
    });
  }));
}
function _drawCoverFit(ctx,src,sw,sh,dw,dh){
  if(!sw||!sh)return false;
  const ratio=Math.max(dw/sw,dh/sh);
  const tw=sw*ratio,th=sh*ratio;
  ctx.drawImage(src,(dw-tw)/2,(dh-th)/2,tw,th);
  return true;
}
function captureSlideThumb(idx,W,H){
  W=W||160;H=H||90;
  const sl=allSlides[idx];if(!sl)return null;
  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  // Try first <img> (handle SVGs whose naturalWidth may be 0)
  const img=sl.querySelector('img');
  if(img&&img.complete){
    const sw=img.naturalWidth||img.width||300;
    const sh=img.naturalHeight||img.height||200;
    if(sw>0&&sh>0){
      try{_drawCoverFit(ctx,img,sw,sh,W,H);return canvas.toDataURL('image/jpeg',0.55);}
      catch(e){/* CORS-tainted, fall through */}
    }
  }
  // Try first inner <canvas> (MEDIA_CYCLER mount renders into one)
  const innerCnv=sl.querySelector('.media-cycler-mount canvas, canvas:not(#stars)');
  if(innerCnv&&innerCnv.width>0){
    try{_drawCoverFit(ctx,innerCnv,innerCnv.width,innerCnv.height,W,H);return canvas.toDataURL('image/jpeg',0.55);}
    catch(e){}
  }
  // Try first <video>
  const vid=sl.querySelector('video');
  if(vid&&vid.videoWidth>0){
    try{_drawCoverFit(ctx,vid,vid.videoWidth,vid.videoHeight,W,H);return canvas.toDataURL('image/jpeg',0.55);}
    catch(e){}
  }
  // Fallback: rendered text card
  return _renderTextCardThumb(sl,idx,W,H);
}
function _renderTextCardThumb(sl,idx,W,H){
  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const ty=sl.dataset.type||'';
  const accent=sl.classList.contains('accent-purple')?'#a78bfa':sl.classList.contains('accent-amber')?'#f59e0b':sl.classList.contains('accent-rose')?'#f43f5e':'#00d4ff';
  // Background
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#0a0d1c');grad.addColorStop(1,'#1a1530');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=accent+'22';ctx.fillRect(0,0,4,H);
  // Slide number
  ctx.fillStyle=accent;ctx.font='700 9px sans-serif';
  ctx.fillText(String(idx).padStart(2,'0'),10,14);
  // Type badge
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='700 7px sans-serif';
  ctx.fillText((ty||'slide').toUpperCase(),W-Math.min(W-12,40),14);
  // Title (word-wrapped)
  const title=getSlideTitle(idx)||'';
  ctx.fillStyle='rgba(240,244,255,.92)';ctx.font='600 11px sans-serif';
  const words=title.split(/\s+/);
  let line='',y=34;
  words.forEach(w=>{
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>W-20&&line){ctx.fillText(line,10,y);line=w;y+=14;if(y>H-6)return;}
    else line=test;
  });
  if(line&&y<=H-4)ctx.fillText(line,10,y);
  return canvas.toDataURL('image/jpeg',0.65);
}
async function runCalibration(){
  naToast('Calibrating…');
  const t0=Date.now();
  // Force-load images and video metadata so captures aren't blank
  await Promise.race([Promise.all([_preloadAllImages(),_preloadVideoFrames()]),new Promise(r=>setTimeout(r,8000))]);
  // Video durations
  const videoDurations={};
  const seen=new Set();
  for(let i=0;i<allSlides.length;i++){
    const vids=allSlides[i].querySelectorAll('video');
    for(const v of vids){
      if(!v.src||seen.has(v.src))continue;seen.add(v.src);
      if(isFinite(v.duration)&&v.duration>0)videoDurations[v.src]=Number(v.duration.toFixed(1));
    }
  }
  _videoDurationCache=videoDurations;
  // Slide thumbnails
  const thumbnails={};
  for(let i=0;i<allSlides.length;i++){
    const sl=allSlides[i];
    if(sl.dataset.hidden==='1')continue;
    if(sl.dataset.type==='settings')continue;
    try{const t=captureSlideThumb(i,160,90);if(t)thumbnails[i]=t;}catch(e){}
  }
  _slideThumbs=thumbnails;
  // Cache to localStorage (per-deckId)
  try{
    const cfg=window._notesConfig;const deckId=(cfg&&cfg.deckId)||'default';
    localStorage.setItem('sd-thumbs-'+deckId,JSON.stringify(thumbnails));
    localStorage.setItem('sd-vidcache-'+deckId,JSON.stringify(videoDurations));
    localStorage.setItem('sd-calibrated-'+deckId,'1');
  }catch(e){}
  const calibration={videoDurations,calibratedAt:new Date().toISOString(),slideCount:Object.keys(thumbnails).length};
  try{await syncCall('setMeta',{key:'calibration',value:calibration});naToast('Calibration saved · '+Object.keys(thumbnails).length+' thumbs · '+Object.keys(videoDurations).length+' videos');}
  catch(e){naToast('Calibration local only · '+Object.keys(thumbnails).length+' thumbs');}
  _renderTopbar();
  console.log('[calibration] '+(Date.now()-t0)+'ms · '+Object.keys(thumbnails).length+' thumbs · '+Object.keys(videoDurations).length+' videos');
}

// ── Fullscreen-on-click for images/videos ─────────────────────────────────
// FLIP-style zoom: capture original rect, move element to a fullscreen overlay,
// animate to viewport-fill. Click again or press Esc to return. Desktop only
// (gated to hover-capable devices so mobile tap-to-advance isn't disrupted).
// Skips QR codes, the cover logo, arrows, the media-cycler canvas, and

(function(){
  if(!window.matchMedia('(hover:hover)').matches)return;
  let activeFs=null;
  const FS_SKIP='.qr-card,.cover-logo-wrap,.placed-arrow,.media-cycler-mount,#anno-panel,#move-hud,#search-overlay,#export-modal,#notes-app,#presenter-popup';
  function ensureOverlay(){
    let ovl=document.getElementById('fx-fs-overlay');

    const hint=document.createElement('div');hint.id='fx-fs-hint';hint.textContent='Click or press Esc to close';document.body.appendChild(hint);
    ovl.addEventListener('click',function(e){if(e.target===ovl)exitFs();});

  }
  function exitFs(){
    if(!activeFs)return;
    const a=activeFs;activeFs=null;
    const live=a.placeholder.getBoundingClientRect();
    a.el.style.transition='top .4s cubic-bezier(.4,.2,.2,1),left .4s cubic-bezier(.4,.2,.2,1),width .4s cubic-bezier(.4,.2,.2,1),height .4s cubic-bezier(.4,.2,.2,1),box-shadow .4s';
    a.el.style.top=live.top+'px';a.el.style.left=live.left+'px';
    a.el.style.width=live.width+'px';a.el.style.height=live.height+'px';
    document.getElementById('fx-fs-overlay').classList.remove('open');
    document.body.classList.remove('fx-fs-active');
    setTimeout(function(){
      if(a.placeholder.parentNode)a.placeholder.parentNode.replaceChild(a.el,a.placeholder);
      else document.body.appendChild(a.el);
      if(a.origStyle)a.el.setAttribute('style',a.origStyle);else a.el.removeAttribute('style');
      a.el.classList.remove('fx-fs-target');
    },420);
  }
  function enterFs(el){
    if(activeFs)return;
    const r=el.getBoundingClientRect();
    const origStyle=el.getAttribute('style');
    const placeholder=document.createElement('div');
    placeholder.className='fx-fs-placeholder';
    placeholder.style.cssText='display:block;width:'+r.width+'px;height:'+r.height+'px;visibility:hidden';
    const ovl=ensureOverlay();
    el.parentNode.insertBefore(placeholder,el);
    ovl.appendChild(el);
    el.style.cssText='position:fixed;top:'+r.top+'px;left:'+r.left+'px;width:'+r.width+'px;height:'+r.height+'px;margin:0;object-fit:contain;border-radius:8px;z-index:10000;transition:none';
    el.classList.add('fx-fs-target');

      ovl.classList.add('open');document.body.classList.add('fx-fs-active');
      const pad=Math.max(24,Math.min(window.innerWidth,window.innerHeight)*.04);
      const vw=window.innerWidth-pad*2,vh=window.innerHeight-pad*2;
      const ar=r.width/r.height;
      let tw=vw,th=vh;
      if(tw/th>ar)tw=th*ar;else th=tw/ar;

      el.style.transition='top .4s cubic-bezier(.2,.7,.3,1.05),left .4s cubic-bezier(.2,.7,.3,1.05),width .4s cubic-bezier(.2,.7,.3,1.05),height .4s cubic-bezier(.2,.7,.3,1.05),box-shadow .4s';
      el.style.top=ty+'px';el.style.left=tx+'px';el.style.width=tw+'px';el.style.height=th+'px';
    });
  }

  // Exit fullscreen if slide changes underneath us
  const _ogGoTo=window.goTo;
  if(_ogGoTo){window.goTo=function(){if(activeFs)exitFs();return _ogGoTo.apply(this,arguments);};}
})();

// Init — ?edit with no hash → land on slide 0 (settings) so user can configure first
updateHUD();
{
  const _hasHash=!!location.hash.replace('#','');
  const _isEdit=new URLSearchParams(location.search).has('edit');
  if(!_hasHash&&_isEdit){goTo(0);}else{goToFromHash();}
}

// =====================================================================
// FEATURE: ?present MODE — single-window presenter view
// Slide preview (scales to fit) + compact resizable speaker ribbon.
// ?present[&ribbon=N] — N is ribbon height in vh, clamped to 5..80, default 10.
// Drag the top edge of the ribbon to resize live; URL + localStorage update.
// =====================================================================
(function(){
  const params=new URLSearchParams(location.search);
  if(!params.has('present'))return;
  document.body.classList.add('present-mode');

  const RIBBON_MIN=5, RIBBON_MAX=80, RIBBON_DEFAULT=10;
  function clampRibbon(v){v=Number(v);if(!isFinite(v))return RIBBON_DEFAULT;return Math.max(RIBBON_MIN,Math.min(RIBBON_MAX,Math.round(v)));}
  function readInitialRibbon(){
    const urlV=params.get('ribbon');
    if(urlV!==null)return clampRibbon(urlV);
    try{const lsV=localStorage.getItem('sd-present-ribbon');if(lsV!==null)return clampRibbon(lsV);}catch(_){}
    return RIBBON_DEFAULT;
  }
  function applyRibbon(vh){document.body.style.setProperty('--ribbon-vh',String(vh));}
  function persistRibbon(vh){
    try{localStorage.setItem('sd-present-ribbon',String(vh));}catch(_){}
    const u=new URL(location.href);u.searchParams.set('present','');u.searchParams.set('ribbon',String(vh));
    const qs=u.searchParams.toString().replace(/(^|&)present=(&|$)/,'$1present$2');
    history.replaceState(null,'',u.pathname+'?'+qs+u.hash);
  }
  let ribbonVh=readInitialRibbon();
  applyRibbon(ribbonVh);

  let prMode=(()=>{try{return localStorage.getItem('sd-present-mode')||'script';}catch(_){return'script';}})();
  function getSectionName(idx){const sl=allSlides[idx];if(!sl)return'';const sec=SECTIONS[+sl.dataset.section];return sec?.lesson?.short||sl.dataset.year||'';}
  function renderRibbon(){
    const num=document.getElementById('pr-num');const sec=document.getElementById('pr-section');const body=document.getElementById('pr-body');
    if(!num||!body)return;
    num.textContent=(current+1)+' / '+total;
    sec.textContent=getSectionName(current);
    if(prMode==='bullets'){
      const bl=(typeof bulletsForSlide==='function')?bulletsForSlide(current):(typeof autoBullets==='function'?autoBullets(getSlideNotes(current)):[]);
      body.innerHTML=bl.length?'<ul class="pr-bullets">'+bl.map(b=>'<li>'+String(b).replace(/</g,'&lt;')+'</li>').join('')+'</ul>':'<em class="pr-empty">(no bullets — script empty)</em>';
    }else{
      const s=(typeof scriptForSlide==='function')?scriptForSlide(current):(getSlideNotes(current)||'');
      body.textContent=s||'(no notes for this slide)';
    }
    body.scrollTop=0;
  }
  function setMode(m){
    prMode=m;
    try{localStorage.setItem('sd-present-mode',m);}catch(_){}
    document.querySelectorAll('.pr-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
    renderRibbon();
  }

  const r=document.createElement('div');r.id='present-ribbon';
  r.innerHTML='<div class="pr-grip" id="pr-grip" title="Drag to resize · double-click to reset"></div><div class="pr-head"><span class="pr-meta"><span class="pr-num" id="pr-num">--</span><span class="pr-sep">·</span><span class="pr-section" id="pr-section">--</span></span><div class="pr-toggle"><button class="pr-tab" data-mode="script">Script</button><button class="pr-tab" data-mode="bullets">Bullets</button></div></div><div class="pr-body" id="pr-body"></div>';
  document.body.appendChild(r);
  r.querySelectorAll('.pr-tab').forEach(t=>t.addEventListener('click',()=>setMode(t.dataset.mode)));
  setMode(prMode);

  // Drag-resize on grip (mouse + touch via pointer events)
  const grip=r.querySelector('#pr-grip');
  let dragStartY=0, dragStartVh=0, dragging=false;
  function onDown(e){
    dragging=true;dragStartY=(e.clientY!=null?e.clientY:e.touches?.[0]?.clientY)||0;dragStartVh=ribbonVh;
    grip.classList.add('dragging');document.body.classList.add('pr-dragging');
    if(e.pointerId!=null&&grip.setPointerCapture){try{grip.setPointerCapture(e.pointerId);}catch(_){}}
    e.preventDefault();
  }
  function onMove(e){
    if(!dragging)return;
    const y=(e.clientY!=null?e.clientY:e.touches?.[0]?.clientY)||0;
    const dy=dragStartY-y;
    const dVh=(dy/window.innerHeight)*100;
    ribbonVh=clampRibbon(dragStartVh+dVh);
    applyRibbon(ribbonVh);
  }
  function onUp(){
    if(!dragging)return;
    dragging=false;grip.classList.remove('dragging');document.body.classList.remove('pr-dragging');
    persistRibbon(ribbonVh);
  }
  if(window.PointerEvent){
    grip.addEventListener('pointerdown',onDown);
    window.addEventListener('pointermove',onMove);
    window.addEventListener('pointerup',onUp);
    window.addEventListener('pointercancel',onUp);
  }else{
    grip.addEventListener('mousedown',onDown);
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    grip.addEventListener('touchstart',onDown,{passive:false});
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('touchend',onUp);
  }
  // Double-click grip → reset to default
  grip.addEventListener('dblclick',()=>{ribbonVh=RIBBON_DEFAULT;applyRibbon(ribbonVh);persistRibbon(ribbonVh);});

  // Hook slide changes so ribbon refreshes on next/prev
  const _prevUH=updateHUD;updateHUD=function(){_prevUH();renderRibbon();};
})();

// =====================================================================
// FEATURE: PRINT / SHOT EXPORT MODES
// =====================================================================
// ?print  → all visible slides stacked as 16:9 pages (print CSS at top of
//           file), steps run to completion, animations settled, iframes
//           swapped for placeholders. Browser File>Print or headless
//           Chrome --print-to-pdf both work; tools/export_pdf.py drives it.
// ?shot=N → single slide N (absolute index, settings=0) full-viewport with
//           chrome hidden, for per-slide screenshot capture.
// Both modes append a JSON fidelity manifest (#sd-print-manifest) that the
// export tools read via --dump-dom: per-slide type/title/flags for anything
// that degraded (cycler→first frame, iframe→placeholder, video→frozen).
(function(){
  const q=new URLSearchParams(location.search);
  const isPrint=q.has('print');
  const shotRaw=q.get('shot');
  if(!isPrint&&shotRaw===null)return;
  // Everything below runs SYNCHRONOUSLY at parse time (the deck is fully
  // built by this point in the script) so that even the earliest headless
  // capture — Chrome dumps/shoots at the load event — sees the final state.
  document.body.classList.remove('vertical-mode');window._verticalMode=false;
  if(isPrint){document.body.classList.add('print-mode');}
  else{
    const n=Math.max(0,Math.min(allSlides.length-1,parseInt(shotRaw,10)||0));
    document.body.classList.add('shot-mode');
    try{const prev=allSlides[current];if(prev&&prev!==allSlides[n]){prev.classList.remove('active');}current=n;const tgt=allSlides[n];tgt.classList.add('active');tgt.style.animation='none';tgt.style.opacity='1';_primeSlideMedia(n);try{updateHUD();}catch(_){}}catch(_){try{goTo(n);}catch(__){}}
    if(window.kfOnSlideEnter)try{window.kfOnSlideEnter();}catch(_){}
  }
  // Freeze videos on an early frame; swap iframes for placeholder panels.
  document.querySelectorAll('#deck video').forEach(v=>{try{v.muted=true;v.autoplay=false;v.removeAttribute('autoplay');v.preload='auto';v.addEventListener('loadedmetadata',()=>{try{v.pause();v.currentTime=Math.min(0.1,(v.duration||1)/2);}catch(_){}});v.load();}catch(_){}});
  document.querySelectorAll('#deck iframe').forEach(f=>{const src=f.src||'';const ph=document.createElement('div');ph.className='sd-iframe-ph';const k=document.createElement('span');k.className='ph-kicker';k.textContent='embedded content';const u=document.createElement('span');u.textContent=src;ph.appendChild(k);ph.appendChild(u);ph.style.minHeight=Math.max(200,f.offsetHeight||0)+'px';f.replaceWith(ph);});
  // Fidelity manifest — read by tools/capture_slides.py via --dump-dom.
  const slides=allSlides.map((sl,i)=>{
    const o={i,type:sl.dataset.type||'',title:(sl.querySelector('.case-title,.lesson-title,.cover-title,h1,h2')?.textContent||sl.dataset.type||'').trim().slice(0,120),hidden:sl.dataset.hidden==='1'};
    if(sl.dataset.exportCycler)o.cycler=+sl.dataset.exportCycler;
    const ifr=sl.querySelectorAll('.sd-iframe-ph').length;if(ifr)o.iframes=ifr;
    const vids=sl.querySelectorAll('video').length;if(vids)o.videos=vids;
    return o;
  });
  const tag=document.createElement('script');tag.type='application/json';tag.id='sd-print-manifest';
  tag.textContent=JSON.stringify({total:allSlides.length,visible:slides.filter(s=>!s.hidden).map(s=>s.i),slides});
  document.body.appendChild(tag);
  // Multi-step animations register via setTimeout(fn,0) — run them to
  // completion one macrotask later, then settle any in-flight animations.
  function finishAnims(){try{document.getAnimations().forEach(a=>{try{a.finish();}catch(_){try{a.cancel();}catch(__){}}});}catch(_){}}
  setTimeout(()=>{setTimeout(()=>{
    try{slideSteps.forEach((st)=>{if(!st||!Array.isArray(st.steps))return;for(let i=st.current||0;i<st.steps.length;i++){try{st.steps[i]();}catch(_){}}st.current=st.steps.length;});}catch(_){}
    finishAnims();
    document.title='SD-EXPORT-READY';
  },30);},30);
  window.addEventListener('load',()=>{setTimeout(finishAnims,400);});
})();
</script>
