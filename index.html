.event-tag{font-size:clamp(.7rem,1.4vw,1.05rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);margin-bottom:36px;opacity:.85}
.talk-title{font-size:clamp(2.8rem,7vw,7.5rem);font-weight:700;line-height:1.05;letter-spacing:-.03em;background:linear-gradient(130deg,#fff 20%,#a5d8ff 55%,#9b8cff 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px}
.talk-subtitle{font-size:clamp(1rem,2.2vw,1.7rem);font-weight:400;color:var(--dim);margin-bottom:64px}
.speaker-card{display:flex;align-items:center;gap:24px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:80px;padding:18px 40px;backdrop-filter:blur(12px)}
.speaker-name{font-size:clamp(1rem,1.4vw,1.4rem);font-weight:600}
.speaker-co{font-size:clamp(.78rem,1.1vw,1.05rem);color:var(--dim);margin-top:3px}
.case-slide{flex-direction:row;gap:clamp(36px,4.5vw,90px);text-align:left;padding:clamp(50px,5vw,110px) clamp(80px,9vw,180px)}
.case-image{flex:0 0 48%;max-width:860px;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.case-image img{width:100%;display:block;border-radius:18px}
.case-image iframe{width:100%;aspect-ratio:16/9;border-radius:18px}
.case-image .ph{width:100%;aspect-ratio:16/10;background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(124,58,237,.12));display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.12);font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;border-radius:18px}
.case-content{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px}
.case-ytag{font-size:clamp(.65rem,.95vw,.95rem);font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--teal);opacity:.6}
.case-title{font-size:clamp(1.8rem,3.6vw,3.8rem);font-weight:700;letter-spacing:-.02em;line-height:1.1}
.case-sub{font-size:clamp(.95rem,1.4vw,1.4rem);color:var(--dim);margin-bottom:14px}
.case-bl{list-style:none;display:flex;flex-direction:column;gap:14px}
.case-bl li{font-size:clamp(.92rem,1.3vw,1.3rem);color:rgba(240,244,255,.7);line-height:1.55;padding-left:24px;position:relative}
.case-bl li::before{content:'';position:absolute;left:0;top:.65em;width:7px;height:7px;border-radius:50%;background:var(--teal);opacity:.6}
.accent-purple .case-ytag{color:var(--purple)}.accent-purple .case-bl li::before{background:var(--purple)}
.accent-amber .case-ytag{color:var(--amber)}.accent-amber .case-bl li::before{background:var(--amber)}
.accent-rose .case-ytag{color:var(--rose)}.accent-rose .case-bl li::before{background:var(--rose)}
.case-bl li a,.lesson-tagline a{color:var(--teal);text-decoration:none;border-bottom:1px solid rgba(0,212,255,.3);transition:color .15s,border-color .15s;word-break:break-all}
.case-bl li a:hover,.lesson-tagline a:hover{color:#7be8ff;border-color:rgba(123,232,255,.6)}
.accent-amber .case-bl li a{color:var(--amber);border-color:rgba(245,158,11,.3)}
.accent-amber .case-bl li a:hover{color:#ffd27a;border-color:rgba(245,158,11,.6)}
.accent-purple .case-bl li a{color:var(--purple);border-color:rgba(167,139,250,.3)}
.accent-purple .case-bl li a:hover{color:#c4b5fd;border-color:rgba(167,139,250,.6)}
.accent-rose .case-bl li a{color:var(--rose);border-color:rgba(244,63,94,.3)}
.accent-rose .case-bl li a:hover{color:#fb7185;border-color:rgba(244,63,94,.6)}
.slide-lesson{padding-bottom:clamp(80px,10vh,140px)}
.year-ghost{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(10rem,24vw,26rem);font-weight:700;letter-spacing:-.06em;line-height:1;color:rgba(255,255,255,.028);pointer-events:none;user-select:none}
.lesson-ey{display:flex;align-items:center;justify-content:center;gap:14px;font-size:clamp(.7rem,1.1vw,1rem);font-weight:600;letter-spacing:.26em;text-transform:uppercase;margin-bottom:30px}
.ey-yr{color:rgba(255,255,255,.4)}.ey-sep{color:rgba(255,255,255,.15)}.ey-badge{color:var(--teal)}
.lesson-title{font-size:calc(clamp(2.4rem,5.8vw,6.2rem)*var(--title-scale));font-weight:700;letter-spacing:-.025em;line-height:1.06;max-width:1300px;margin-bottom:32px;white-space:pre-line}
.lesson-tagline{font-size:calc(clamp(1rem,1.7vw,1.6rem)*var(--tagline-scale));color:var(--dim);max-width:880px;line-height:1.7}
.lesson-tagline .para-gap{display:block;height:var(--para-gap)}
.lesson-rule{width:64px;height:4px;border-radius:2px;background:var(--teal);margin:32px auto 0;opacity:.7}
.lesson-tags{margin-top:18px;font-size:clamp(.6rem,.9vw,.85rem);font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18)}
.accent-purple .ey-badge{color:var(--purple)}.accent-purple .lesson-rule{background:var(--purple)}
.accent-amber .ey-badge{color:var(--amber)}.accent-amber .lesson-rule{background:var(--amber)}
.accent-rose .ey-badge{color:var(--rose)}.accent-rose .lesson-rule{background:var(--rose)}
.slide-bonus .ey-badge{color:var(--amber)}.slide-bonus .lesson-rule{background:var(--amber)}.slide-bonus .year-ghost{color:rgba(245,158,11,.04)}
.slide-settings{background:rgba(3,5,12,.98)}
.cfg-panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:52px 64px;max-width:960px;width:90%;backdrop-filter:blur(20px)}
body[data-bg-style]:not([data-bg-style="none"]) .cfg-panel{background:rgba(8,10,20,.32);backdrop-filter:blur(6px)}
.cfg-title{font-size:1.6rem;font-weight:700;letter-spacing:-.02em;color:#fff;margin-bottom:6px}
.cfg-subtitle{font-size:.75rem;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:44px;opacity:.7}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px 56px;margin-bottom:36px}
.cfg-row{display:flex;flex-direction:column;gap:10px}
.cfg-label{font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45)}
.cfg-control{display:flex;align-items:center;gap:14px}
.cfg-control input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:rgba(255,255,255,.14);border-radius:2px;outline:none;cursor:pointer}
.cfg-control input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--teal);cursor:pointer;box-shadow:0 0 10px rgba(0,212,255,.5)}
.cfg-val{min-width:3.8em;font-size:.82rem;color:var(--teal);font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.cfg-color{display:flex;align-items:center;gap:10px}
.cfg-color input[type=color]{width:36px;height:28px;border:1px solid rgba(255,255,255,.2);border-radius:6px;background:none;cursor:pointer;padding:0}
.cfg-color input[type=text]{width:90px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text);font-family:var(--font);font-size:.78rem;padding:5px 8px;border-radius:5px;outline:none}
.cfg-color input[type=text]:focus{border-color:var(--teal)}
.cfg-select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text);font-family:var(--font);font-size:.78rem;padding:6px 10px;border-radius:6px;outline:none;cursor:pointer;width:100%}
.cfg-select option{background:#0a0c18;color:#fff}
.cfg-reset{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:var(--rose);font-family:var(--font);font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:10px 20px;border-radius:6px;cursor:pointer;transition:all .15s;margin-top:8px}
.cfg-reset:hover{background:rgba(244,63,94,.2)}
.cfg-hint{font-size:.65rem;color:rgba(255,255,255,.2);letter-spacing:.06em;text-align:center;border-top:1px solid rgba(255,255,255,.06);padding-top:20px;line-height:1.8}
#search-overlay{position:fixed;inset:0;z-index:500;background:rgba(3,5,12,.82);backdrop-filter:blur(18px);display:flex;align-items:flex-start;justify-content:center;padding-top:11vh;opacity:0;pointer-events:none;transition:opacity .18s}
#search-overlay.open{opacity:1;pointer-events:all}
#search-box{width:min(700px,90vw);background:rgba(14,16,28,.98);border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;box-shadow:0 32px 96px rgba(0,0,0,.7)}
.srch-input-row{display:flex;align-items:center;gap:12px;padding:15px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.srch-icon{color:rgba(255,255,255,.35);font-size:1.05rem}
#search-input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:var(--font);font-size:1.05rem;font-weight:500;caret-color:var(--teal)}
#search-input::placeholder{color:rgba(255,255,255,.22)}
.srch-kbd{font-size:.6rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:4px;padding:2px 7px;color:rgba(255,255,255,.32);font-family:var(--font)}
#srch-results{max-height:56vh;overflow-y:auto;padding:6px}
.srch-empty{padding:38px 24px;text-align:center;color:rgba(255,255,255,.2);font-size:.82rem}
.sr{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .1s}
.sr:hover,.sr.sel{background:rgba(0,212,255,.1)}
.sr-num{font-size:.6rem;font-weight:700;color:rgba(255,255,255,.25);min-width:24px;padding-top:3px}
.sr-body{flex:1;min-width:0}
.sr-title{font-size:.88rem;font-weight:600;color:#e8eeff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.sr-snip{font-size:.72rem;color:rgba(255,255,255,.4);line-height:1.55;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.sr-snip mark{background:none;color:var(--teal);font-weight:600}
.sr-badge{display:inline-block;font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,212,255,.55);background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.18);border-radius:3px;padding:1px 5px}
.srch-footer{padding:6px 18px 10px;font-size:.6rem;color:rgba(255,255,255,.2);display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.06)}
.slide-map{padding:clamp(20px,2.5vw,48px)}
.map-label{font-size:clamp(.7rem,1.1vw,1rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:16px;align-self:flex-start}
#map-svg{width:100%;height:100%;max-height:84vh}
#slide-grid-zone{position:fixed;bottom:0;left:0;right:0;height:38px;z-index:35;pointer-events:auto}
#slide-grid{position:fixed;bottom:0;left:0;right:0;z-index:36;padding:14px 24px 18px;background:linear-gradient(180deg,transparent 0%,rgba(6,8,16,.92) 50%,rgba(6,8,16,.98) 100%);backdrop-filter:blur(10px);display:flex;gap:6px;overflow-x:auto;justify-content:flex-start;flex-wrap:nowrap;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#slide-grid.visible{transform:translateY(0)}
.sg-thumb{flex:0 0 auto;min-width:64px;height:46px;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:rgba(255,255,255,.03);padding:5px 8px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;font-family:var(--font);transition:all .15s}
.sg-thumb:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);transform:translateY(-2px)}
.sg-thumb.active{background:rgba(0,212,255,.18);border-color:var(--teal);box-shadow:0 0 12px rgba(0,212,255,.3)}
.sg-thumb.slide-hidden{opacity:.3;border-style:dashed}
.sg-num{font-size:.62rem;font-weight:600;color:rgba(255,255,255,.55)}
.sg-thumb.active .sg-num{color:var(--teal)}
.sg-label{font-size:.52rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.sg-thumb.active .sg-label{color:rgba(0,212,255,.7)}
.sg-thumb.sg-bonus{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2)}
.sg-thumb.sg-bonus.active{background:rgba(245,158,11,.18);border-color:var(--amber)}
.sg-thumb.sg-bonus.active .sg-num,.sg-thumb.sg-bonus.active .sg-label{color:var(--amber)}
.close-ey{font-size:clamp(.7rem,1.4vw,1.05rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--amber);margin-bottom:36px;opacity:.85}
.close-title{font-size:clamp(3.2rem,7.5vw,7.5rem);font-weight:700;letter-spacing:-.03em;line-height:1;background:linear-gradient(130deg,#fff 20%,#fde68a 60%,#f59e0b 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:28px}
.close-sub{font-size:clamp(1.1rem,2vw,1.7rem);color:var(--dim);margin-bottom:40px}
.contact-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.contact-pill{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:48px;padding:14px 28px;font-size:clamp(.95rem,1.3vw,1.2rem)}
.contact-pill .lbl{opacity:.4;font-size:clamp(.65rem,.9vw,.85rem);text-transform:uppercase;letter-spacing:.1em}
.close-qr-row{display:flex;gap:24px;justify-content:center;align-items:flex-start;margin-top:36px;flex-wrap:wrap}
.gal-card{display:flex;flex-direction:column;align-items:stretch;text-align:center;gap:5px;text-decoration:none;color:inherit;transition:transform .18s ease}
.gal-card img{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:10px;background:#0c0e18;border:1px solid rgba(255,255,255,.08);display:block}
.gal-card:hover{transform:translateY(-4px)}
.gal-card:hover img{box-shadow:0 8px 24px rgba(0,0,0,.5);border-color:rgba(0,212,255,.55)}
.gal-name{font:600 .72rem var(--font);color:#f0f4ff}
.gal-desc{font:.6rem var(--font);line-height:1.3;color:rgba(255,255,255,.5)}
.qr-link{text-decoration:none;color:inherit;transition:transform .18s ease}
.qr-link:hover{transform:translateY(-3px)}
.qr-card{display:flex;flex-direction:column;align-items:center;gap:8px;width:176px}
.qr-card img{border-radius:10px;background:#fff;padding:8px;display:block;width:160px;height:160px}
.qr-label{font-size:clamp(.72rem,1vw,.9rem);color:rgba(255,255,255,.6);letter-spacing:.1em;font-weight:500;text-align:center}
.qr-badge{font-size:clamp(.58rem,.78vw,.76rem);font-weight:600;letter-spacing:.08em;text-align:center;line-height:1.35}
.qr-badge.b-amber{color:var(--amber);animation:qrP1 2.1s ease-in-out infinite}
.qr-badge.b-teal{color:var(--teal);animation:qrP2 1.9s ease-in-out infinite}
@keyframes qrP1{0%,100%{opacity:.7;transform:rotate(-3deg) scale(1)}50%{opacity:1;transform:rotate(-3deg) scale(1.08)}}
@keyframes qrP2{0%,100%{opacity:.7;transform:rotate(2.5deg) scale(1)}50%{opacity:1;transform:rotate(2.5deg) scale(1.08)}}
#counter{position:fixed;top:32px;right:48px;z-index:20;font-size:clamp(.72rem,1vw,.95rem);font-weight:500;letter-spacing:.12em;color:rgba(255,255,255,.25)}
#brand{position:fixed;bottom:28px;left:48px;z-index:20;font-size:clamp(.68rem,.95vw,.9rem);font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18)}
.nav-arrows{position:fixed;bottom:24px;right:160px;z-index:100;display:flex;gap:10px;align-items:center}
.nav-playing{width:20px;height:20px;border:2px solid rgba(0,212,255,.3);border-top-color:var(--teal);border-radius:50%;opacity:0;transition:opacity .2s;pointer-events:none}
.nav-playing.active{opacity:1;animation:navSpin .8s linear infinite}
@keyframes navSpin{to{transform:rotate(360deg)}}
.nav-autoplay{display:flex;align-items:center;gap:6px;font-size:.6rem;letter-spacing:.1em;color:rgba(255,255,255,.3);cursor:pointer;user-select:none;margin-left:8px}
.nav-autoplay input{accent-color:var(--teal);cursor:pointer}
.nav-autoplay:hover{color:rgba(255,255,255,.5)}
#step-indicator{position:fixed;bottom:82px;right:160px;z-index:20;font-size:.6rem;font-weight:600;letter-spacing:.14em;color:rgba(255,255,255,.3);text-align:center;width:102px;pointer-events:none}
.nav-btn{width:46px;height:46px;border:1px solid rgba(255,255,255,.18);border-radius:10px;background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.nav-btn:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.3);color:var(--teal)}
body.presentation-mode #counter,body.presentation-mode #brand,body.presentation-mode #step-indicator,body.presentation-mode .nav-arrows,body.presentation-mode .nav-autoplay,body.presentation-mode #mobile-ui-toggle{opacity:.15}
#mobile-ui-toggle{display:none;position:fixed;top:12px;right:12px;z-index:1001;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);font-size:16px;cursor:pointer;backdrop-filter:blur(6px);align-items:center;justify-content:center}
@media(max-width:900px),(pointer:coarse){#mobile-ui-toggle{display:flex}}
body.presentation-mode #slide-grid,body.presentation-mode #slide-grid-zone,body.presentation-mode #anno-toggle,body.presentation-mode #move-toggle,body.presentation-mode #anno-panel,body.presentation-mode #move-hud,body.presentation-mode #anno-prompt,body.presentation-mode #search-overlay,body.presentation-mode #anim-scrub-bar{display:none!important}
#anno-toggle,#move-toggle{position:fixed;top:24px;z-index:1000;border:1px solid rgba(0,212,255,.4);color:var(--teal);font-family:var(--font);font-size:.66rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:8px 14px;border-radius:6px;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;background:rgba(0,212,255,.1)}
#anno-toggle{left:24px}
#move-toggle{left:148px;border-color:rgba(245,158,11,.4);color:var(--amber);background:rgba(245,158,11,.1)}
#anno-toggle.active{background:var(--amber);color:#060810;border-color:var(--amber)}
#move-toggle.active{background:var(--rose);color:#060810;border-color:var(--rose)}
#move-hud{position:fixed;top:24px;left:280px;z-index:1000;display:none;align-items:center;gap:8px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:6px 12px;backdrop-filter:blur(8px)}
#move-hud.visible{display:flex}
#move-hud .mh-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.7);font-family:var(--font);font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:6px 10px;border-radius:5px;cursor:pointer;transition:all .15s}
#move-hud .mh-btn:hover:not(:disabled){background:rgba(245,158,11,.2);color:var(--amber)}
#move-hud .mh-sep{color:rgba(255,255,255,.15);font-size:.8rem;margin:0 2px}
body.move-mode .slide.active{overflow:visible}
#move-hud .mh-btn:disabled{opacity:.3;cursor:not-allowed}
#move-hud .mh-hint{font-size:.6rem;color:rgba(255,255,255,.45);padding:0 4px}
#move-hud .mh-hint kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:3px;padding:1px 5px;font-family:inherit;color:var(--amber)}
body.annotate-mode *:not(#anno-panel):not(#anno-panel *):not(#anno-toggle):not(#move-toggle):not(#slide-grid):not(#slide-grid *):hover{outline:2px dashed var(--teal)!important;outline-offset:2px;cursor:crosshair!important}
body.move-mode .slide.active *:not(#anno-toggle):not(#move-toggle):hover{outline:2px dashed var(--amber)!important;outline-offset:2px;cursor:move!important}
body.move-mode .slide.active *{user-select:none}
body.edit-text .slide.active [contenteditable="true"]{outline:2px solid var(--teal)!important;cursor:text!important;user-select:text!important;background:rgba(0,212,255,.08)}
.dragging{opacity:.85!important;outline:2px solid var(--amber)!important}
#anno-panel{position:fixed;top:70px;left:24px;z-index:1001;width:320px;max-height:70vh;background:rgba(10,12,24,.96);border:1px solid rgba(0,212,255,.3);border-radius:10px;padding:16px;font-family:var(--font);font-size:.78rem;color:var(--text);backdrop-filter:blur(12px);overflow-y:auto;display:none}
#anno-panel.visible{display:block}
#anno-panel h3{font-size:.68rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
#anno-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:300px;overflow-y:auto}

/* === ?present MODE — single-window presenter (resizable slide + script ribbon) === */
body.present-mode{--ribbon-vh:10;--present-scale:calc(1 - var(--ribbon-vh) * 0.01)}
body.present-mode #deck{bottom:0}
body.present-mode #deck>.slide{transform:scale(var(--present-scale));transform-origin:top center}
body.present-mode #counter,body.present-mode #brand,body.present-mode #notes-drawer,body.present-mode #mobile-ui-toggle,body.present-mode #slide-grid-zone,body.present-mode #slide-grid,body.present-mode #search-overlay{display:none!important}

#present-ribbon{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(var(--ribbon-vh,10) * 1vh);z-index:500;background:rgba(6,8,16,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(0,212,255,.25);flex-direction:column;font-family:var(--font);color:rgba(240,244,255,.85)}

.pr-section{color:rgba(240,244,255,.7)}
.pr-sep{opacity:.4}

.pr-empty{opacity:.5;font-style:italic;font-size:.9rem}
body.pr-dragging,body.pr-dragging *{user-select:none!important;-webkit-user-select:none!important;cursor:ns-resize!important}
@media (max-width:640px){.pr-body{font-size:.92rem;padding:8px 14px;line-height:1.45}.pr-head{padding:5px 14px}.pr-meta{font-size:.62rem;letter-spacing:.12em}}

.cfg-btn-export{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);color:var(--teal);font-family:var(--font);font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:10px 18px;border-radius:6px;cursor:pointer;transition:all .15s;margin-top:8px}

/* === LAYOUT: PLACED (PPT-coordinate absolute positioning) === */
.case-slide.layout-placed{display:flex;align-items:center;justify-content:center;padding:0}

body.notes-mode #deck,body.notes-mode #counter,body.notes-mode #brand,body.notes-mode #step-indicator,body.notes-mode .nav-arrows,body.notes-mode #mobile-ui-toggle,body.notes-mode #slide-grid-zone,body.notes-mode #slide-grid,body.notes-mode #anno-toggle,body.notes-mode #move-toggle,body.notes-mode #notes-drawer,body.notes-mode #search-overlay,body.notes-mode .bg{display:none!important}

/* === ANIMATED BACKGROUND OVERLAYS — driven by body[data-bg-style] === */
.bg-overlay{position:absolute;inset:0;display:none;pointer-events:none;mix-blend-mode:var(--bg-blend,screen);overflow:hidden}
body[data-bg-style="aurora"] .bg-overlay--aurora,
body[data-bg-style="ember"]  .bg-overlay--ember,
body[data-bg-style="ghost"]  .bg-overlay--ghost,
body[data-bg-style="nebula"] .bg-overlay--nebula,
body[data-bg-style="extreme"] .bg-overlay--extreme{display:block}
.bg-overlay .blob{position:absolute;border-radius:50%;will-change:transform}
/* Aurora */
.bg-overlay--aurora .blob{filter:blur(110px)}
.bg-overlay--aurora .b1{width:55%;aspect-ratio:1;background:radial-gradient(circle,rgba(0,212,255,.55),rgba(0,212,255,0));top:-10%;left:-10%;animation:bgAur1 26s linear infinite}
.bg-overlay--aurora .b2{width:48%;aspect-ratio:1;background:radial-gradient(circle,rgba(167,139,250,.5),rgba(167,139,250,0));top:30%;right:-10%;animation:bgAur2 32s linear infinite}
.bg-overlay--aurora .b3{width:62%;aspect-ratio:1;background:radial-gradient(circle,rgba(245,158,11,.32),rgba(245,158,11,0));bottom:-20%;left:10%;animation:bgAur3 38s linear infinite}
@keyframes bgAur1{0%{transform:translate(0,0)}25%{transform:translate(28vw,18vh)}50%{transform:translate(40vw,38vh)}75%{transform:translate(12vw,28vh)}100%{transform:translate(0,0)}}
@keyframes bgAur2{0%{transform:translate(0,0)}25%{transform:translate(-20vw,-15vh)}50%{transform:translate(-32vw,8vh)}75%{transform:translate(-15vw,22vh)}100%{transform:translate(0,0)}}
@keyframes bgAur3{0%{transform:translate(0,0)}25%{transform:translate(18vw,-15vh)}50%{transform:translate(28vw,-30vh)}75%{transform:translate(8vw,-18vh)}100%{transform:translate(0,0)}}
/* Ember */
.bg-overlay--ember .blob{filter:blur(140px);will-change:transform,opacity}
.bg-overlay--ember .b1{width:60%;aspect-ratio:1;background:radial-gradient(circle,rgba(245,158,11,.5),rgba(245,158,11,0));top:-15%;left:20%;animation:bgEm1 32s linear infinite,bgEmP1 9s ease-in-out infinite alternate}
.bg-overlay--ember .b2{width:50%;aspect-ratio:1;background:radial-gradient(circle,rgba(244,63,94,.35),rgba(244,63,94,0));bottom:-10%;right:-5%;animation:bgEm2 40s linear infinite,bgEmP2 12s ease-in-out infinite alternate}
.bg-overlay--ember .b3{width:40%;aspect-ratio:1;background:radial-gradient(circle,rgba(254,215,170,.18),rgba(254,215,170,0));top:50%;left:-10%;animation:bgEm3 36s linear infinite,bgEmP3 14s ease-in-out infinite alternate}
@keyframes bgEm1{0%{transform:translate(0,0)}25%{transform:translate(-15vw,18vh)}50%{transform:translate(-22vw,28vh)}75%{transform:translate(-8vw,18vh)}100%{transform:translate(0,0)}}
@keyframes bgEm2{0%{transform:translate(0,0)}25%{transform:translate(-18vw,-12vh)}50%{transform:translate(-28vw,-22vh)}75%{transform:translate(-12vw,-10vh)}100%{transform:translate(0,0)}}
@keyframes bgEm3{0%{transform:translate(0,0)}25%{transform:translate(28vw,-6vh)}50%{transform:translate(38vw,-12vh)}75%{transform:translate(20vw,-4vh)}100%{transform:translate(0,0)}}
@keyframes bgEmP1{0%{opacity:.7}100%{opacity:1}}
@keyframes bgEmP2{0%{opacity:.55}100%{opacity:1}}
@keyframes bgEmP3{0%{opacity:.5}100%{opacity:.95}}
/* Ghost */
.bg-overlay--ghost .blob{filter:blur(140px)}
.bg-overlay--ghost .b1{width:50%;aspect-ratio:1;background:radial-gradient(circle,rgba(180,210,255,.32),rgba(180,210,255,0));top:10%;left:5%;animation:bgGh1 28s linear infinite}
.bg-overlay--ghost .b2{width:42%;aspect-ratio:1;background:radial-gradient(circle,rgba(220,200,255,.28),rgba(220,200,255,0));top:30%;right:5%;animation:bgGh2 36s linear infinite}
.bg-overlay--ghost .b3{width:55%;aspect-ratio:1;background:radial-gradient(circle,rgba(160,180,220,.24),rgba(160,180,220,0));bottom:-5%;left:30%;animation:bgGh3 32s linear infinite}
.bg-overlay--ghost .b4{width:38%;aspect-ratio:1;background:radial-gradient(circle,rgba(200,210,250,.22),rgba(200,210,250,0));top:55%;left:-5%;animation:bgGh4 44s linear infinite}
@keyframes bgGh1{0%{transform:translate(0,0)}25%{transform:translate(20vw,12vh)}50%{transform:translate(28vw,-2vh)}75%{transform:translate(10vw,-12vh)}100%{transform:translate(0,0)}}
@keyframes bgGh2{0%{transform:translate(0,0)}25%{transform:translate(-15vw,14vh)}50%{transform:translate(-18vw,28vh)}75%{transform:translate(-6vw,16vh)}100%{transform:translate(0,0)}}
@keyframes bgGh3{0%{transform:translate(0,0)}25%{transform:translate(-12vw,-12vh)}50%{transform:translate(8vw,-22vh)}75%{transform:translate(14vw,-8vh)}100%{transform:translate(0,0)}}
@keyframes bgGh4{0%{transform:translate(0,0)}25%{transform:translate(22vw,-4vh)}50%{transform:translate(36vw,12vh)}75%{transform:translate(18vw,18vh)}100%{transform:translate(0,0)}}
/* Nebula */
.bg-overlay--nebula .blob{filter:blur(120px)}
.bg-overlay--nebula .swirl{position:absolute;inset:-25%;background:conic-gradient(from 0deg,rgba(0,212,255,.05),rgba(167,139,250,.04),rgba(245,158,11,.05),rgba(244,63,94,.04),rgba(0,212,255,.05));filter:blur(80px);will-change:transform;animation:bgNebSwirl 80s linear infinite}
.bg-overlay--nebula .b1{width:45%;aspect-ratio:1;background:radial-gradient(circle,rgba(0,212,255,.32),rgba(0,212,255,0));top:-5%;left:0;animation:bgNeb1 30s linear infinite}
.bg-overlay--nebula .b2{width:42%;aspect-ratio:1;background:radial-gradient(circle,rgba(167,139,250,.30),rgba(167,139,250,0));bottom:-5%;right:5%;animation:bgNeb2 36s linear infinite}
.bg-overlay--nebula .b3{width:35%;aspect-ratio:1;background:radial-gradient(circle,rgba(245,158,11,.22),rgba(245,158,11,0));top:50%;left:50%;animation:bgNeb3 26s linear infinite}
@keyframes bgNeb1{0%{transform:translate(0,0)}25%{transform:translate(22vw,18vh)}50%{transform:translate(32vw,8vh)}75%{transform:translate(14vw,-8vh)}100%{transform:translate(0,0)}}
@keyframes bgNeb2{0%{transform:translate(0,0)}25%{transform:translate(-18vw,-14vh)}50%{transform:translate(-28vw,4vh)}75%{transform:translate(-12vw,12vh)}100%{transform:translate(0,0)}}
@keyframes bgNeb3{0%{transform:translate(-50%,-50%)}25%{transform:translate(-30%,-58%)}50%{transform:translate(-22%,-42%)}75%{transform:translate(-58%,-44%)}100%{transform:translate(-50%,-50%)}}
@keyframes bgNebSwirl{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
/* Extreme — debug/proof option */
.bg-overlay--extreme .blob{filter:blur(70px)}
.bg-overlay--extreme .b1{width:60%;aspect-ratio:1;background:radial-gradient(circle,rgba(0,212,255,1),rgba(0,212,255,0));top:-15%;left:-15%;animation:bgExt1 7s linear infinite}
.bg-overlay--extreme .b2{width:55%;aspect-ratio:1;background:radial-gradient(circle,rgba(167,139,250,.95),rgba(167,139,250,0));top:25%;right:-15%;animation:bgExt2 9s linear infinite}
.bg-overlay--extreme .b3{width:65%;aspect-ratio:1;background:radial-gradient(circle,rgba(245,158,11,.85),rgba(245,158,11,0));bottom:-20%;left:5%;animation:bgExt3 11s linear infinite}
.bg-overlay--extreme .b4{width:50%;aspect-ratio:1;background:radial-gradient(circle,rgba(244,63,94,.85),rgba(244,63,94,0));top:40%;left:30%;animation:bgExt4 8s linear infinite}
@keyframes bgExt1{0%{transform:translate(0,0)}25%{transform:translate(50vw,30vh)}50%{transform:translate(70vw,60vh)}75%{transform:translate(20vw,40vh)}100%{transform:translate(0,0)}}
@keyframes bgExt2{0%{transform:translate(0,0)}25%{transform:translate(-40vw,-25vh)}50%{transform:translate(-60vw,15vh)}75%{transform:translate(-30vw,40vh)}100%{transform:translate(0,0)}}
@keyframes bgExt3{0%{transform:translate(0,0)}25%{transform:translate(40vw,-30vh)}50%{transform:translate(60vw,-50vh)}75%{transform:translate(20vw,-30vh)}100%{transform:translate(0,0)}}
@keyframes bgExt4{0%{transform:translate(0,0)}25%{transform:translate(-25vw,25vh)}50%{transform:translate(20vw,-25vh)}75%{transform:translate(35vw,15vh)}100%{transform:translate(0,0)}}
.case-slide.layout-asset-belt{display:flex;align-items:center;justify-content:center;padding:0}
.asset-belt-stage{position:relative;aspect-ratio:16/9;width:100%;height:auto;max-height:100%;max-width:calc(100vh*16/9);overflow:hidden;display:flex;align-items:center;justify-content:center}
.asset-belt-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(18px,2.5vw,40px);padding:clamp(50px,5vw,110px);text-align:center;z-index:1;pointer-events:none;opacity:1;max-width:1300px;margin:0 auto;left:0;right:0}
.asset-belt-overlay .big-eyebrow{font-size:clamp(1.4rem,2.6vw,2.4rem);font-weight:500;color:rgba(240,244,255,.78);letter-spacing:-.01em;line-height:1.2}
.asset-belt-overlay .big-text{font-size:clamp(3rem,8vw,8rem);font-weight:700;letter-spacing:-.04em;line-height:1.15;background:linear-gradient(135deg,#fff 30%,#a5e8ff 70%,#00d4ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0}
.asset-belt-overlay .big-caption{font-size:clamp(1rem,1.6vw,1.55rem);color:rgba(240,244,255,.65);font-style:italic;line-height:1.45;max-width:900px}
.asset-belt-track{display:flex;gap:4vw;height:62%;align-items:center;position:absolute;left:100%;top:19%;will-change:transform;z-index:10}
.asset-belt-item{height:100%;flex-shrink:0;border-radius:8px;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,.55);background:rgba(6,8,16,.95)}
.asset-belt-item img,.asset-belt-item video{height:100%;width:auto;display:block;object-fit:contain}

/* ── Interactive flourish — hover/glow/grow across content tiles ─────────────
   Per-section glow color via --fx-glow; defaults to teal. Hover effects gated
   to (hover:hover) so they don't fire on touch devices (where tap=advance and
   a sticky :hover would feel wrong). Add the .accent-* class to a slide to
   override --fx-glow with that section's accent color.
   Forked from nxtbld-2026-productizing-xr. */
:root{--fx-glow:rgba(0,212,255,.45)}
.accent-amber{--fx-glow:rgba(245,158,11,.5)}
.accent-purple{--fx-glow:rgba(167,139,250,.5)}
.accent-rose{--fx-glow:rgba(244,63,94,.5)}
.accent-teal{--fx-glow:rgba(0,212,255,.5)}

.placed-item:not(.placed-arrow):not(.placed-text--plain),
.asset-belt-item,
.qr-card,
.placed-text:not(.placed-text--plain){
  transition:transform .35s cubic-bezier(.2,.8,.2,1.05),box-shadow .35s,filter .35s,border-color .35s;
}
@media(hover:hover){
  .placed-item:not(.placed-arrow):not(.placed-text--plain):hover,
  .asset-belt-item:hover,
  .qr-card:hover,
  .placed-text:not(.placed-text--plain):hover{
    transform:translateY(-6px) scale(1.025);
    box-shadow:0 18px 40px rgba(0,0,0,.55),0 0 36px var(--fx-glow);
    z-index:5;
    cursor:pointer;
  }
  .placed-item:not(.placed-arrow):not(.placed-text--plain):hover img,
  .placed-item:not(.placed-arrow):not(.placed-text--plain):hover video,
  .asset-belt-item:hover img,
  .asset-belt-item:hover video{filter:saturate(1.08)}
}

@keyframes fx-click-pulse{0%{filter:drop-shadow(0 0 0 var(--fx-glow))}45%{filter:drop-shadow(0 0 36px var(--fx-glow))}100%{filter:drop-shadow(0 0 0 var(--fx-glow))}}
.fx-clicked{animation:fx-click-pulse .55s ease}

/* ── Fullscreen-on-click for images/videos ──────────────────────────────────
   Click any <img> or <video> inside a slide to zoom it to fullscreen with a
   backdrop blur. Click again or press Esc to return. Desktop only — gated to
   (hover:hover) so mobile tap-to-advance isn't disrupted. */
#fx-fs-overlay{position:fixed;inset:0;background:rgba(2,4,10,0);backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);z-index:9999;pointer-events:none;opacity:0;transition:background .35s,backdrop-filter .35s,opacity .35s}
#fx-fs-overlay.open{background:rgba(2,4,10,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);pointer-events:auto;opacity:1}
.fx-fs-target{cursor:zoom-out!important;box-shadow:0 28px 80px rgba(0,0,0,.6),0 0 64px var(--fx-glow)!important}
body.fx-fs-active{overflow:hidden}
#fx-fs-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Space Grotesk',sans-serif;font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6);background:rgba(6,8,16,.7);padding:8px 18px;border-radius:999px;border:1px solid rgba(255,255,255,.12);z-index:10001;opacity:0;transition:opacity .35s;pointer-events:none}
body.fx-fs-active #fx-fs-hint{opacity:1}
</style>

{const _OAC=window.AudioContext||window.webkitAudioContext;const _PAC=function(...a){const c=new _OAC(...a);_activeAudioCtxs.add(c);const oc=c.close.bind(c);c.close=function(){_activeAudioCtxs.delete(c);return oc();};return c;};_PAC.prototype=_OAC.prototype;window.AudioContext=_PAC;if(window.webkitAudioContext)window.webkitAudioContext=_PAC;}

(function(){

(function(){const bar=document.createElement('div');bar.id='anim-scrub-bar';bar.style.cssText='position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:1100;display:none;align-items:center;gap:10px;background:rgba(6,8,16,.92);border:1px solid rgba(245,158,11,.4);border-radius:10px;padding:10px 14px;backdrop-filter:blur(10px);font-family:var(--font);font-size:.7rem;color:var(--amber)';bar.innerHTML=`<button id="scrub-replay" style="background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.4);border-radius:5px;padding:5px 10px;font:inherit;cursor:pointer">Replay</button><button id="scrub-pp" style="background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.4);border-radius:5px;padding:5px 10px;font:inherit;cursor:pointer;width:70px">Pause</button><div id="scrub-track" style="position:relative;width:360px;height:28px;display:flex;align-items:center"><input id="scrub-r" type="range" min="0" max="5000" value="0" step="10" style="width:100%;accent-color:var(--amber);position:relative;z-index:2"><div id="kf-markers" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1"></div></div><span id="scrub-t" style="min-width:60px;text-align:right;color:rgba(245,158,11,.8)">0 ms</span><button id="kf-set" title="Set keyframe for last-moved element at current time" style="background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.4);border-radius:5px;padding:5px 8px;font:inherit;cursor:pointer">◆ KF</button><button id="kf-del" title="Delete keyframe at current time" style="background:rgba(244,63,94,.15);color:var(--rose);border:1px solid rgba(244,63,94,.4);border-radius:5px;padding:5px 8px;font:inherit;cursor:pointer;display:none">✕ KF</button>`;document.body.appendChild(bar);const rng=bar.querySelector('#scrub-r'),tl=bar.querySelector('#scrub-t'),pp=bar.querySelector('#scrub-pp'),rp=bar.querySelector('#scrub-replay');let paused=false;function sa(){const s // ── Keyframe animation system ──
(function(){
  const kfStore=new Map(),kfAnims=new Map();
  const markers=document.getElementById('kf-markers'),delBtn=document.getElementById('kf-del'),setBtn=document.getElementById('kf-set');
  setBtn?.addEventListener('click',()=>{
    if(!_lastMoveEl){annoToast('Move an element first, then click ◆ KF');return;}
    const xform=gX(_lastMoveEl);
    window.kfAddKeyframe(_lastMoveEl,xform);
  });

  window._kfUpdateDel=function(time){
    let has=false;
    kfStore.forEach(kfs=>{if(kfs.some(k=>k.slide===current&&Math.abs(k.time-time)<20))has=true;});
    delBtn.style.display=has?'inline-block':'none';
  };

  window._kfRenderMarkers=function(){
    if(!markers)return;markers.innerHTML='';
    const rng=window._scrubRange?.();const max=rng?+rng.max:5000;
    kfStore.forEach(kfs=>{
      kfs.filter(k=>k.slide===current).forEach(kf=>{
        const pct=(kf.time/max)*100;
        const d=document.createElement('div');
        d.style.cssText=`position:absolute;left:${pct}%;top:50%;width:8px;height:8px;background:var(--amber);transform:translate(-50%,-50%) rotate(45deg);border-radius:1px;opacity:.85;pointer-events:none`;
        markers.appendChild(d);
      });
    });
  };

  function buildAnim(el,sel,slideIdx){
    const old=kfAnims.get(sel);if(old)old.cancel();
    const kfs=(kfStore.get(sel)||[]).filter(k=>k.slide===slideIdx);
    if(kfs.length<2)return;
    const dur=kfs[kfs.length-1].time-kfs[0].time;if(dur<=0)return;
    const t0=kfs[0].time;
    const frames=kfs.map(kf=>({
      transform:`translate(${kf.tx}px,${kf.ty}px) rotate(${kf.rot}deg) scale(${kf.scale})`,
      offset:(kf.time-t0)/dur,
    }));
    el.style.transform='';el.style.transformBox='fill-box';el.style.transformOrigin='center center';
    const anim=el.animate(frames,{duration:dur,delay:t0,fill:'both',easing:'ease-in-out'});
    if(window._scrubPaused?.()){anim.pause();try{anim.currentTime=Math.max(0,(window._scrubTime?.()??0)-t0);}catch(e){}}
    kfAnims.set(sel,anim);tMap.delete(el);
  }

  window._kfRebuild=function(){
    kfAnims.forEach(a=>a.cancel());kfAnims.clear();
    kfStore.forEach((kfs,sel)=>{
      if(kfs.filter(k=>k.slide===current).length>=2){
        const el=document.querySelector(sel);if(el)buildAnim(el,sel,current);
      }
    });
  };

  window.kfAddKeyframe=function(el,xform){
    const sel=aSel(el),time=window._scrubTime?.()??0;
    if(!kfStore.has(sel))kfStore.set(sel,[]);
    const kfs=kfStore.get(sel);
    const idx=kfs.findIndex(k=>k.slide===current&&Math.abs(k.time-time)<5);
    const kf={slide:current,time,tx:xform.tx,ty:xform.ty,scale:xform.scale,rot:xform.rot};
    if(idx>=0)kfs[idx]=kf;else kfs.push(kf);
    kfs.sort((a,b)=>a.time-b.time);
    const slideKfs=kfs.filter(k=>k.slide===current);
    if(slideKfs.length>=2)buildAnim(el,sel,current);
    // Extend scrubber if needed
    const rng=window._scrubRange?.();if(rng&&time>+rng.max)rng.max=time;
    window._kfRenderMarkers();saveKf();
    annoToast(`◆ Keyframe at ${time}ms (${slideKfs.length} total)`);
  };

  delBtn?.addEventListener('click',()=>{
    const time=window._scrubTime?.()??0;let deleted=false;
    kfStore.forEach((kfs,sel)=>{
      const idx=kfs.findIndex(k=>k.slide===current&&Math.abs(k.time-time)<20);
      if(idx>=0){kfs.splice(idx,1);deleted=true;
        const rem=kfs.filter(k=>k.slide===current);
        if(rem.length<2){const a=kfAnims.get(sel);if(a){a.cancel();kfAnims.delete(sel);}}
        else{const el=document.querySelector(sel);if(el)buildAnim(el,sel,current);}
        if(!kfs.length)kfStore.delete(sel);
      }
    });
    if(deleted){window._kfRenderMarkers();saveKf();delBtn.style.display='none';annoToast(`Keyframe deleted at ${time}ms`);}
  });

  function saveKf(){
    const arr=aL().filter(a=>a.type!=='keyframe');
    kfStore.forEach((kfs,sel)=>{if(kfs.length)arr.push({selector:sel,context:`keyframes (${kfs.length})`,text:'KEYFRAMES '+kfs.map(k=>k.time+'ms').join(', '),timestamp:new Date().toISOString(),type:'keyframe',keyframes:kfs});});
    aS(arr);aRender();
  }
  function loadKf(){
    kfStore.clear();
    aL().filter(a=>a.type==='keyframe').forEach(a=>{if(a.keyframes&&a.selector)kfStore.set(a.selector,a.keyframes);});
  }
  window.kfOnSlideEnter=function(){loadKf();setTimeout(()=>{window._kfRebuild?.();window._kfRenderMarkers?.();},500);};
})();

    let caseIdx=0;for(let j=lessonIdxs[si]+1;j<idx;j++){if(allSlides[j]?.dataset.type==='case')caseIdx++;}
    return SECTIONS[si].cases[caseIdx]?.notes||'';

  if(ty==='cover')return'Welcome the audience. Wait for stragglers. Introduce yourself and the talk theme.';

// FEATURE: TALK DURATION ESTIMATOR
// =====================================================================
function estimateSlideDuration(idx){
  const notes=getSlideNotes(idx);
  const sl=allSlides[idx];
  const ty=sl?.dataset.type||'';
  let seconds=0;
  if(!notes||notes.trim()===''){
    seconds=30; // no notes default
  }else{
    const lines=notes.split('\n').filter(l=>l.trim());
    lines.forEach(line=>{
      const trimmed=line.trim();
      const isBullet=/^[-\u2022*]/.test(trimmed);
      const wordCount=trimmed.split(/\s+/).length;
      if(isBullet||wordCount<15){
        seconds+=20; // bullet point: ~20s
      }else{
        seconds+=Math.ceil(wordCount/150*60); // full sentence: words/150 WPM
      }
    });
  }
  // Lesson slides: add 10 seconds natural pause
  if(ty==='lesson'||ty==='bonus')seconds+=10;
  // Steps: add 5s per step beyond first
  const ss=slideSteps.get(sl);
  if(ss&&ss.steps.length>1)seconds+=(ss.steps.length-1)*5;
  return seconds;
}

function calcTotalDuration(){
  let total=0;
  for(let i=0;i<allSlides.length;i++){
    if(allSlides[i].dataset.hidden==='1')continue;
    total+=estimateSlideDuration(i);
  }
  return total;
}

function fmtTime(secs){
  const m=Math.floor(secs/60),s=Math.floor(secs%60);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function updateDurationDisplay(){
  const el=document.getElementById('v-duration');
  if(el)el.textContent='~'+fmtTime(calcTotalDuration());
}

// Timer & pacing
let _timerInterval=null;
function startTalkTimer(){
  if(_talkStartTime)return;
  _talkStartTime=Date.now();
  _timerInterval=setInterval(updateTimers,1000);
}
function updateTimers(){
  if(!_talkStartTime)return;
  const elapsedSec=Math.floor((Date.now()-_talkStartTime)/1000);
  const totalEst=calcTotalDuration();
  const remainSec=Math.max(0,totalEst-elapsedSec);
  const elapsed=fmtTime(elapsedSec);
  const remaining='~'+fmtTime(remainSec);
  let paceIcon='\uD83D\uDFE2'; // green
  if(elapsedSec>totalEst*1.25)paceIcon='\uD83D\uDD34'; // red 25%+
  else if(elapsedSec>totalEst*1.1)paceIcon='\uD83D\uDFE1'; // yellow 10%+
  // Haptic pacing alerts (mobile only \u2014 navigator.vibrate is no-op on desktop)
  if(remainSec<60&&remainSec>0){
    // Last minute: hard double-pulse every 10 seconds
    const tenSec=Math.floor(elapsedSec/10);
    if(tenSec!==_lastVibTenSec){_lastVibTenSec=tenSec;navigator.vibrate?.([250,80,250]);}
  }else if(elapsedSec>totalEst*1.1){
    // Running behind by >10%: single light pulse once per minute
    const minute=Math.floor(elapsedSec/60);
    if(minute!==_lastVibMinute){_lastVibMinute=minute;navigator.vibrate?.(120);}
  }
  const data={type:'timer-update',elapsed,remaining,paceIcon};
  _notesCh.postMessage(data);
  if(_notesWin&&!_notesWin.closed){
    const doc=_notesWin.document;
    if(doc.getElementById('pn-elapsed')){
      doc.getElementById('pn-elapsed').textContent=elapsed;
      doc.getElementById('pn-remain').textContent=remaining;
      doc.getElementById('pn-pace-icon').textContent=paceIcon;
    }
  }
}

async function runInlineExport(){
  const prog=document.getElementById('em-progress');
  const btn=document.getElementById('em-inline');
  btn.disabled=true;
  prog.textContent='Fetching external resources...';
  try{
    // Clone the document
    const html=document.documentElement.cloneNode(true);
    // Inline Google Fonts
    const fontLinks=html.querySelectorAll('link[href*="fonts.googleapis"]');
    for(const link of fontLinks){
      try{
        prog.textContent='Fetching fonts from '+link.href.substring(0,60)+'...';
        const resp=await fetch(link.href);
        const css=await resp.text();
        // Fetch each woff2 url and convert to base64
        const urls=[...css.matchAll(/url\(([^)]+)\)/g)].map(m=>m[1]);
        let inlinedCSS=css;
        for(const url of urls){
          try{
            const fontResp=await fetch(url);
            const blob=await fontResp.blob();
            const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
            inlinedCSS=inlinedCSS.replace(url,b64);
          }catch(e){/* skip individual font */}
        }
        const style=document.createElement('style');
        style.textContent=inlinedCSS;
        link.parentNode.replaceChild(style,link);
      }catch(e){/* skip font link */}
    }
    // Inline QR codes
    const qrImgs=html.querySelectorAll('img[src*="api.qrserver"]');
    for(const img of qrImgs){
      try{
        prog.textContent='Fetching QR code...';
        const resp=await fetch(img.src);
        const blob=await resp.blob();
        const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
        img.src=b64;
      }catch(e){/* skip */}
    }
    // Remove preconnect links
    html.querySelectorAll('link[rel="preconnect"]').forEach(l=>l.remove());
    // Build download blob
    prog.textContent='Building self-contained file...';
    const blob=new Blob(['<!DOCTYPE html>\n'+html.outerHTML],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='spatial-deck-offline.html';
    a.style.cssText='display:inline-block;margin-top:10px;color:var(--teal);font-weight:600;font-size:.82rem;text-decoration:underline;cursor:pointer;';
    a.textContent='Download spatial-deck-offline.html ('+Math.round(blob.size/1024)+' KB)';
    prog.textContent='';
    prog.appendChild(a);
    btn.disabled=false;
  }catch(e){
    prog.textContent='Error: '+e.message;
    btn.disabled=false;
  }
}

// FEATURE: GIF FIX in MEDIA_CYCLER (use <img>, not canvas, for animated GIFs)
// =====================================================================
// Wraps buildMediaCycler: any item whose src ends in .gif gets swapped for
// a real <img> overlay so the animation plays. Pixelated reveal is skipped
// for GIF items only — fade-in instead. Other items still use the canvas
// pipeline unchanged.
(function(){
  const _origBMC=buildMediaCycler;
  window.buildMediaCycler=function(sl,items,opts){
    const hasGif=Array.isArray(items)&&items.some(it=>it&&it.type==='image'&&it.src&&/\.gif(\?|$)/i.test(it.src));
    if(!hasGif)return _origBMC(sl,items,opts);
    // Mixed mode: render a stack of <img>/<video> elements with cross-fade.
    const mount=sl.querySelector('.media-cycler-mount');if(!mount)return;
    const portrait=opts&&opts.portrait;const imageDuration=(opts&&opts.imageDuration)||6000;
    mount.style.cssText='position:relative;width:100%;'+(portrait?'aspect-ratio:338/600':'aspect-ratio:16/10')+';border-radius:18px;overflow:hidden';
    const layers=items.map((it,i)=>{
      let el;
      if(it.type==='video'){el=document.createElement('video');el.src=it.src;el.muted=true;el.playsInline=true;el.loop=!!it.loop;el.preload='metadata';}
      else if(it.type==='image'){el=document.createElement('img');el.src=it.src;el.loading='lazy';}
      else {el=document.createElement('div');el.style.background=`linear-gradient(135deg,${it.color1||'rgba(0,212,255,.18)'},${it.color2||'rgba(6,8,16,.4)'})`;el.style.display='flex';el.style.alignItems='center';el.style.justifyContent='center';if(it.label){el.textContent=it.label;el.style.color='rgba(255,255,255,.18)';el.style.font='600 .85rem var(--font)';el.style.letterSpacing='.1em';el.style.textTransform='uppercase';}}
      el.style.cssText+=';position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:'+(i===0?'1':'0')+';transition:opacity .9s ease';
      mount.appendChild(el);return el;
    });
    if(items.length<=1)return;
    let idx=0;
    setInterval(()=>{
      layers[idx].style.opacity='0';
      const v=layers[idx];if(v.tagName==='VIDEO')try{v.pause();}catch(_){}
      idx=(idx+1)%layers.length;
      layers[idx].style.opacity='1';
      const nv=layers[idx];if(nv.tagName==='VIDEO')try{nv.currentTime=0;nv.play().catch(()=>{});}catch(_){}
      try{playBing&&playBing();}catch(_){}
    },imageDuration);
    if(layers[0].tagName==='VIDEO')try{layers[0].play().catch(()=>{});}catch(_){}
  };
})();

// =====================================================================
// FEATURE: INTRO POWER-UP SPRITE BARRAGE  ("Hi, I'm Alex" lesson slide)
// Step 0 = clean lesson slide. Each → adds a tool "weapon" that fires its
// logo-sprite across the slide, faster each time, building to a comedic
// overload: Unreal -> Claude -> Xcode -> Godot -> Blender. Registered via
// slideSteps; reset() (called by goTo on entry) clears the whole barrage.
// Inspired by ibrews/harvardxr-keynote's intro mechanic, sized for a
// standard lesson slide (overlay layer, no bespoke slide).
// =====================================================================
(function buildIntroBarrage(){
  const slide = allSlides.find(s => s.dataset.type==='lesson' && /Hi, I.?m Alex/.test(s.querySelector('.lesson-title')?.textContent||''));
  if(!slide) return;
  const layer = document.createElement('div');
  layer.style.cssText='position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:4';
  slide.appendChild(layer);

  // mini brand glyphs — color + rough shape so they read while spinning
  const LOGOS = {
    unreal:'<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="#f4f4f6" stroke="#0d0f15" stroke-width="1.5"/><path d="M14 13v9a6 6 0 0 0 12 0c0-3-2-5-5-5" fill="none" stroke="#0d0f15" stroke-width="3" stroke-linecap="round"/></svg>',
    claude:'<svg viewBox="0 0 40 40"><g stroke="#D97757" stroke-width="2.6" stroke-linecap="round"><line x1="26" y1="20" x2="37" y2="20"/><line x1="20" y1="26" x2="20" y2="37"/><line x1="14" y1="20" x2="3" y2="20"/><line x1="20" y1="14" x2="20" y2="3"/><line x1="24.2" y1="24.2" x2="32" y2="32"/><line x1="15.8" y1="24.2" x2="8" y2="32"/><line x1="15.8" y1="15.8" x2="8" y2="8"/><line x1="24.2" y1="15.8" x2="32" y2="8"/></g></svg>',
    xcode:'<svg viewBox="0 0 40 40"><rect x="3" y="3" width="34" height="34" rx="9" fill="#1f7bf5"/><line x1="15" y1="28" x2="23" y2="20" stroke="#fff" stroke-width="3" stroke-linecap="round"/><path d="M21 13l7 4-3 5-7-4z" fill="#fff"/></svg>',
    godot:'<svg viewBox="0 0 40 40"><path d="M9 16c0-4 5-7 11-7s11 3 11 7v9c0 3-3 5-6 5h-2l-3 3-3-3h-2c-3 0-6-2-6-5z" fill="#478CBF"/><circle cx="15.5" cy="20" r="3.4" fill="#fff"/><circle cx="24.5" cy="20" r="3.4" fill="#fff"/><circle cx="15.5" cy="20" r="1.5" fill="#214b6b"/><circle cx="24.5" cy="20" r="1.5" fill="#214b6b"/><rect x="17" y="26" width="6" height="2" rx="1" fill="#2b5a80"/><rect x="13" y="7" width="3" height="4" rx="1.5" fill="#478CBF"/><rect x="24" y="7" width="3" height="4" rx="1.5" fill="#478CBF"/></svg>',
    blender:'<svg viewBox="0 0 40 40"><circle cx="20" cy="21" r="15" fill="#E87D0D"/><circle cx="15" cy="16" r="4.6" fill="#fff"/><circle cx="15" cy="16" r="2.4" fill="#2f6fb0"/><path d="M22 12l9-3-5 7z" fill="#f6a13a"/></svg>'
  };
  const TOOLS=[
    {key:'unreal', name:'UNREAL', color:'#f2f2f4', interval:520},
    {key:'claude', name:'CLAUDE', color:'#D97757', interval:380},
    {key:'xcode',  name:'XCODE',  color:'#3b8bff', interval:300},
    {key:'godot',  name:'GODOT',  color:'#5aa6e0', interval:240},
    {key:'blender',name:'BLENDER',color:'#E87D0D', interval:180}
  ];

  let hero=null, level=0;
  function ensureHero(){
    if(hero) return;
    hero=document.createElement('div');
    hero.style.cssText='position:absolute;left:50%;bottom:9%;width:72px;height:124px;margin-left:-36px;transform:scale(0);transform-origin:center bottom;will-change:transform';
    const _hsvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    _hsvg.setAttribute('viewBox','-22 -48 44 76');
    _hsvg.setAttribute('preserveAspectRatio','xMidYMax meet');
    _hsvg.style.cssText='width:100%;height:100%;overflow:visible';
    buildAvatar(_hsvg,{withBeard:true,hairColor:'#7a4020',hairDark:'#4a2410',hairLight:'#a0601a',hairShadow:'#2d1508',beardColor:'#6b3d18',beardLight:'#8a5028',shirtColor:'#5a7c5a',shirtDark:'#4a6548'});
    const _armsUp=_hsvg.querySelector('.av-arms-up'),_armsDown=_hsvg.querySelector('.av-arms-down');
    if(_armsUp)_armsUp.style.display='none';
    if(!_armsTmr)_armsTmr=setInterval(function(){if(_armsUp&&_armsDown){const u=_armsUp.style.display!=='none';_armsUp.style.display=u?'none':'';_armsDown.style.display=u?'':'none';}},550);
    hero.appendChild(_hsvg);
    layer.appendChild(hero);
  }

  const sprites=new Set();
  const MAX=60;
  function shoot(tool){
    if(sprites.size>=MAX) return;
    const W=layer.clientWidth||960, H=layer.clientHeight||540;
    const ox=W*0.5, oy=H*0.85;
    const sz=30+Math.random()*16;
    const sp=document.createElement('div');
    sp.style.cssText='position:absolute;left:'+ox+'px;top:'+oy+'px;width:'+sz+'px;height:'+sz+'px;margin:'+(-sz/2)+'px 0 0 '+(-sz/2)+'px;will-change:transform,opacity;filter:drop-shadow(0 2px 5px rgba(0,0,0,.45))';
    sp.innerHTML=LOGOS[tool.key];
    layer.appendChild(sp); sprites.add(sp);
    const ang=(-90 + (Math.random()-0.5)*150)*Math.PI/180;
    const dist=(0.62+Math.random()*0.5)*Math.hypot(W,H);
    const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    const _lv=Math.max(1,Math.min(level,5));
    const spin=(Math.random()*2-1)*360*(0.35+_lv*0.32);   // gentle spin early so the logo reads; spinnier as it escalates
    const dur=(2600-_lv*250)+Math.random()*450;            // slower flight at the start, ramps up toward the overload
    const a=sp.animate([
      {transform:'translate(0,0) rotate(0deg) scale(.6)',opacity:0},
      {offset:.12,transform:'translate('+(dx*.12)+'px,'+(dy*.12)+'px) rotate('+(spin*.12)+'deg) scale(1)',opacity:1},
      {offset:.8,opacity:1},
      {transform:'translate('+dx+'px,'+dy+'px) rotate('+spin+'deg) scale(1)',opacity:0}
    ],{duration:dur,easing:'cubic-bezier(.15,.6,.3,1)'});
    const done=()=>{sp.remove();sprites.delete(sp);};
    a.onfinish=done; a.oncancel=done;
  }

  let _ctx=null; let _armsTmr=null;
  function powerSfx(lvl){
    try{
      if(!_ctx||_ctx.state==='closed') _ctx=new (window.AudioContext||window.webkitAudioContext)();
      if(_ctx.state==='suspended') _ctx.resume();
      const t=_ctx.currentTime, base=330*Math.pow(2,(lvl-1)/5);
      const tone=(f,s,d,v)=>{const o=_ctx.createOscillator(),g=_ctx.createGain();o.type='square';o.frequency.value=f;o.connect(g);g.connect(_ctx.destination);g.gain.setValueAtTime(v,t+s);g.gain.exponentialRampToValueAtTime(0.001,t+s+d);o.start(t+s);o.stop(t+s+d);};
      tone(base,0,.07,.07); tone(base*1.5,.07,.07,.07); tone(base*2,.14,.16,.08);
    }catch(e){}
  }

  function flashHero(color){
    ensureHero();
    const was=level; level++;
    const rest=1+Math.min(level*0.05,0.3);
    const from=was===0?0:rest*0.85;
    hero.animate([{transform:'scale('+from+')'},{transform:'scale('+(rest+0.35)+')'},{transform:'scale('+rest+')'}],{duration:520,easing:'cubic-bezier(.3,1.5,.5,1)',fill:'forwards'});
    const ring=document.createElement('div');
    ring.style.cssText='position:absolute;left:50%;bottom:9%;width:34px;height:34px;margin-left:-17px;border-radius:50%;border:3px solid '+color+';opacity:.9';
    layer.appendChild(ring);
    ring.animate([{transform:'scale(.4)',opacity:.9},{transform:'scale(4)',opacity:0}],{duration:650,easing:'ease-out'}).onfinish=()=>ring.remove();
    powerSfx(level);
  }
  function floatLabel(tool){
    const lab=document.createElement('div');
    lab.textContent='+ '+tool.name;
    lab.style.cssText='position:absolute;left:50%;bottom:21%;transform:translateX(-50%);color:'+tool.color+';font-family:var(--font);font-weight:700;font-size:1.15rem;letter-spacing:.2em;text-shadow:0 2px 12px rgba(0,0,0,.65);white-space:nowrap';
    layer.appendChild(lab);
    lab.animate([
      {transform:'translateX(-50%) translateY(12px)',opacity:0},
      {offset:.25,transform:'translateX(-50%) translateY(0)',opacity:1},
      {offset:.75,opacity:1},
      {transform:'translateX(-50%) translateY(-36px)',opacity:0}
    ],{duration:1500,easing:'ease-out'}).onfinish=()=>lab.remove();
  }

  const weapons=[]; let timer=null;
  function loopTick(){const now=performance.now();for(const w of weapons){if(now>=w.nextAt){shoot(w.tool);w.nextAt=now+w.interval;}}}
  function startLoop(){if(!timer)timer=setInterval(loopTick,45);}
  function stopLoop(){if(timer){clearInterval(timer);timer=null;}}

  function addWeapon(i){
    const tool=TOOLS[i];
    flashHero(tool.color); floatLabel(tool);
    weapons.push({tool,interval:tool.interval,nextAt:performance.now()+170});
    if(i===TOOLS.length-1) weapons.forEach(w=>w.interval=Math.max(110,w.interval*0.7)); // overload finale
    if(slide.classList.contains('active')) startLoop();
  }
  function clearAll(){
    stopLoop(); weapons.length=0; level=0;
    sprites.forEach(s=>{try{s.getAnimations().forEach(a=>a.cancel());}catch(e){}s.remove();}); sprites.clear();
    layer.querySelectorAll('div').forEach(d=>{if(d!==hero)d.remove();});
    if(hero){hero.remove();hero=null;}
    clearInterval(_armsTmr);_armsTmr=null;
  }

  const steps=[0,1,2,3,4].map(i=>(()=>addWeapon(i)));
  const sync=()=>{ if(slide.classList.contains('active')&&weapons.length) startLoop(); else stopLoop(); };
  new MutationObserver(sync).observe(slide,{attributes:true,attributeFilter:['class']});
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) stopLoop(); else sync(); });
  setTimeout(()=>{ slideSteps.set(slide,{current:0,steps,reset:clearAll}); },0);
})();

// =====================================================================
// FEATURE: AGILE LENS ORBIT  ("Agile Lens" case — starfield + client ring)
// =====================================================================
(function(){
  var sl=null;
  for(var _i=0;_i<allSlides.length;_i++){
    var _t=allSlides[_i].querySelector&&allSlides[_i].querySelector('.case-title');
    if(_t&&_t.textContent.indexOf('Agile Lens')>=0){sl=allSlides[_i];break;}
  }
  if(!sl)return;

  // Full-bleed takeover — replace slide contents
  sl.style.cssText='position:absolute;inset:0;display:block;overflow:hidden;background:#060810';
  sl.innerHTML='';

  // Canvas for starfield + orbit
  var cv=document.createElement('canvas');
  cv.style.cssText='position:absolute;inset:0;width:100%;height:100%';
  sl.appendChild(cv);

  // Center content overlay
  var overlay=document.createElement('div');
  overlay.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10';
  overlay.innerHTML=
    '<div style="text-align:center;line-height:1.25">'
    +'<div style="font-size:42px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.04em;font-family:var(--font)">AGILE LENS</div>'
    +'<div style="font-size:16px;font-weight:400;color:rgba(255,255,255,.35);letter-spacing:.22em;text-transform:uppercase;margin-top:6px;font-family:var(--font)">IMMERSIVE DESIGN STUDIO</div>'
    +'<div style="font-size:14px;color:rgba(255,255,255,.28);letter-spacing:.18em;text-transform:uppercase;margin-top:5px;font-family:var(--font)">EST. 2016</div>'
    +'<div style="font-size:13px;color:rgba(255,255,255,.2);letter-spacing:.2em;text-transform:uppercase;margin-top:4px;font-family:var(--font)">NYC</div>'
    +'</div>';
  sl.appendChild(overlay);

  // Bottom tagline
  var tagline=document.createElement('div');
  tagline.style.cssText='position:absolute;bottom:38px;left:0;right:0;text-align:center;font-size:11px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.18);font-family:var(--font);pointer-events:none;z-index:10';
  tagline.textContent='BOOTSTRAPPED · XR SPECIALISTS · 10 YEARS';
  sl.appendChild(tagline);

  // Clients to orbit
  var CLIENTS=['FOUR SEASONS','GOOGLE','ROYAL CARIBBEAN','LINCOLN CENTER','SAMSUNG','WALDORF ASTORIA','CBS','EPIC GAMES','KENNEDY CENTER','DISNEY','BELL','RBC'];

  var ctx=null,W=0,H=0,cx=0,cy=0,R=0;
  var stars=[];
  var angle=0;
  var rafId=null;

  function resize(){
    W=sl.clientWidth||1600;
    H=sl.clientHeight||900;
    cv.width=W;cv.height=H;
    cx=W/2;cy=H/2;
    R=Math.min(W,H)*0.28;
    ctx=cv.getContext('2d');
    // Regenerate stars
    stars=[];
    for(var i=0;i<220;i++){
      stars.push({
        x:Math.random()*W,
        y:Math.random()*H,
        r:Math.random()*1.4+0.2,
        a:Math.random()*0.6+0.1
      });
    }
  }

  function draw(){
    if(!ctx)return;
    ctx.clearRect(0,0,W,H);

    // Starfield
    for(var i=0;i<stars.length;i++){
      var st=stars[i];
      ctx.beginPath();
      ctx.arc(st.x,st.y,st.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+st.a+')';
      ctx.fill();
    }

    // Glowing ring — outer glow passes
    var ringAlpha=[.06,.1,.16,.24];
    var ringWidths=[18,12,6,2];
    for(var g=0;g<ringAlpha.length;g++){
      ctx.beginPath();
      ctx.arc(cx,cy,R,0,Math.PI*2);
      ctx.strokeStyle='rgba(160,180,255,'+ringAlpha[g]+')';
      ctx.lineWidth=ringWidths[g];
      ctx.stroke();
    }
    // Crisp ring line
    ctx.beginPath();
    ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(200,210,255,.55)';
    ctx.lineWidth=1.2;
    ctx.stroke();

    // Orbiting client labels
    var n=CLIENTS.length;
    for(var j=0;j<n;j++){
      var theta=angle+(j/n)*Math.PI*2;
      var lx=cx+Math.cos(theta)*R;
      var ly=cy+Math.sin(theta)*R;

      // Font scale by vertical position (perspective-ish)
      var scale=0.85+0.15*((Math.sin(theta)+1)/2);
      var alpha=0.55+0.35*((Math.sin(theta)+1)/2);

      ctx.save();
      ctx.translate(lx,ly);
      ctx.font='600 '+(Math.round(11*scale))+'px var(--font, "Space Grotesk", system-ui, sans-serif)';
      ctx.fillStyle='rgba(255,255,255,'+alpha+')';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.letterSpacing='0.16em';
      ctx.fillText(CLIENTS[j],0,0);
      ctx.restore();
    }

    angle+=0.0025;
    rafId=requestAnimationFrame(draw);
  }

  function start(){
    if(rafId)return;
    resize();
    draw();
  }
  function stop(){
    if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  }

  // Start/stop with slide visibility
  var obs=new MutationObserver(function(){
    if(sl.classList.contains('active')){start();}else{stop();}
  });
  obs.observe(sl,{attributes:true,attributeFilter:['class']});
  window.addEventListener('resize',function(){if(sl.classList.contains('active')){resize();}});

  if(sl.classList.contains('active'))start();
})();

(function(){

  var wrap=document.createElement('div');
  wrap.style.cssText='position:relative;flex:1;min-height:440px;border-radius:18px;background:rgba(6,8,22,.52);border:1px solid rgba(255,255,255,.07);box-sizing:border-box;overflow:hidden';
  ci.appendChild(wrap);
  var svgNS='http://www.w3.org/2000/svg';
  // SVG viewBox is set to ACTUAL PIXELS via ResizeObserver (1 unit = 1px) so
  // circles stay circular and path endpoints land exactly on the %-positioned
  // logos (logo center = x/100*W, y/100*H = SVG path endpoint).
  var hsvg=document.createElementNS(svgNS,'svg');
  hsvg.setAttribute('preserveAspectRatio','xMidYMid meet');
  hsvg.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1';
  wrap.appendChild(hsvg);
  var Y16=14,Y23=50,Y26=86;          // vertical % of each era row
  var X16=[9,21,34,50,66,79];        // horizontal % of 2016 tools
  var X26=[10,26,46,64,80];          // horizontal % of 2026 tools
  // Build line records: {ax,ay,bx,by in %, path el, dots:[animateMotion els]}
  var lines=[];
  function addLine(ax,ay,bx,by,color,line){
    var p=document.createElementNS(svgNS,'path');
    p.setAttribute('fill','none');
    p.setAttribute('stroke',line);
    p.setAttribute('stroke-width','1.3');
    p.setAttribute('stroke-dasharray','5 7');
    hsvg.appendChild(p);
    var anims=[];
    for(var ph=0;ph<3;ph++){
      var c=document.createElementNS(svgNS,'circle');
      c.setAttribute('r','4');c.setAttribute('fill',color);c.setAttribute('opacity','0');
      c.classList.add('fd-dot');
      var am=document.createElementNS(svgNS,'animateMotion');
      am.setAttribute('dur','1.9s');am.setAttribute('begin',String(ph*0.63)+'s');
      am.setAttribute('repeatCount','indefinite');
      c.appendChild(am);hsvg.appendChild(c);
      anims.push(am);
    }
    lines.push({ax:ax,ay:ay,bx:bx,by:by,p:p,anims:anims});
  }
  X16.forEach(function(x){addLine(x,Y16,50,Y23,'#f59e0b','rgba(245,158,11,.28)');});
  X26.forEach(function(x){addLine(50,Y23,x,Y26,'#a78bfa','rgba(167,139,250,.32)');});
  function layout(){
    var W=wrap.clientWidth,H=wrap.clientHeight;
    if(!W||!H)return;
    hsvg.setAttribute('viewBox','0 0 '+W+' '+H);
    lines.forEach(function(l){
      var sx=l.ax/100*W,sy=l.ay/100*H,ex=l.bx/100*W,ey=l.by/100*H;
      var my=(sy+ey)/2;
      var d='M'+sx+','+sy+' C'+sx+','+my+' '+ex+','+my+' '+ex+','+ey;
      l.p.setAttribute('d',d);
      l.anims.forEach(function(a){a.setAttribute('path',d);});

        ], { duration: 180, easing: 'ease-out', fill: 'forwards' });

        // 4. POW burst flash
        powBurst.style.opacity = '1';
        animCSS(powBurst, [
          { opacity: 0, transform: 'translate(430px,310px) scale(0.5)' },
          { opacity: 1, transform: 'translate(430px,310px) scale(1.15)', offset: 0.3 },
          { opacity: 1, transform: 'translate(430px,310px) scale(1)', offset: 0.6 },
          { opacity: 0, transform: 'translate(430px,310px) scale(0.9)' }
        ], { duration: 600, easing: 'ease-out', fill: 'forwards' });

        // 5. MCP node flies off (up-right + rotate + fade)
        animCSS(mcpNode, [
          { opacity: 1, transform: 'translate(0,0) rotate(0deg)' },
          { opacity: 0, transform: 'translate(120px,-160px) rotate(28deg)' }
        ], { duration: 500, easing: 'ease-in', delay: 100, fill: 'forwards' });

        // 6. Fade client->MCP line and fan
        animCSS(lnClient, [{ opacity: 1 }, { opacity: 0 }],
          { duration: 300, delay: 80, fill: 'forwards' });

          { duration: 300, delay: 80, fill: 'forwards' });

        // 7. Show direct lines and draw them in (staggered)
        directLines.style.opacity = '1';
        function drawLine(el, dashLen, delay) {
          animCSS(el, [
            { strokeDashoffset: String(dashLen) },
            { strokeDashoffset: '0' }
          ], { duration: 480, easing: 'ease-out', delay: delay, fill: 'forwards' });
        }
        drawLine(dlBlender, 420, 350);
        drawLine(dlUnreal, 312, 500);
        drawLine(dlGodot, 420, 650);

        // 8. Celebratory bob
        setTimeout(function() {
          animCSS(puncherG, [
            { transform: 'translate(430px, 405px) scale(2.2)' },
            { transform: 'translate(430px, 395px) scale(2.2)' },
            { transform: 'translate(430px, 405px) scale(2.2)' },
            { transform: 'translate(430px, 397px) scale(2.2)' },
            { transform: 'translate(430px, 405px) scale(2.2)' }
          ], { duration: 700, easing: 'ease-in-out', fill: 'forwards' });
        }, 300);
      };
    } else {
      // Fallback if WAAPI unavailable — instant state
      puncherG.setAttribute('transform', 'translate(430,405) scale(2.2)');
      mcpNode.style.opacity = '0';
      lnClient.style.opacity = '0';
      mcpFan.style.opacity = '0';
      directLines.style.opacity = '1';
      dlBlender.setAttribute('stroke-dashoffset', '0');
      dlUnreal.setAttribute('stroke-dashoffset', '0');
      dlGodot.setAttribute('stroke-dashoffset', '0');
    }
  }

  setTimeout(function() {
    slideSteps.set(sl, { current: 0, reset: resetFn, steps: [punchFn] });
  }, 0);
})();

// =====================================================================
// FEATURE: PACING MATH UPGRADES
// (over video) marker · adaptive WPM · projected wall-clock finish
// =====================================================================
const OVER_VIDEO_RE=/\(\s*over\s+video\s*\)/i;
window._notesOverrides=new Map();   // idx -> {script, bullets, video_seconds, type, title}
window._videoDurationCache={};       // src -> seconds
window._slideThumbs={};              // idx -> dataUrl
window._notesMeta={};                // {target_finish, default_view, wpm}
window._adaptiveWpm=null;            // rolling WPM, set after a few advances
let _wpmSamples=[];                  // [{words, seconds}]

function _wordsCount(s){return (s||'').trim().split(/\s+/).filter(Boolean).length;}
function _splitOverVideo(script){
  if(!script)return{pre:'',over:''};
  const m=script.match(OVER_VIDEO_RE);
  if(!m)return{pre:script,over:''};
  const i=m.index;
  return{pre:script.slice(0,i).trim(),over:script.slice(i+m[0].length).trim()};
}
function _videoSecondsFor(idx){
  const ov=_notesOverrides.get(idx);
  if(ov&&ov.video_seconds!=null)return Number(ov.video_seconds)||0;
  const sl=allSlides[idx];if(!sl)return 0;
  let total=0;
  sl.querySelectorAll('video').forEach(v=>{
    const cached=v.src&&_videoDurationCache[v.src];
    if(cached)total+=Number(cached)||0;
    else if(isFinite(v.duration)&&v.duration>0)total+=v.duration;
  });
  return total;
}
function _effectiveWpm(){
  if(_notesMeta.wpm)return Number(_notesMeta.wpm);
  if(_adaptiveWpm)return _adaptiveWpm;
  return 150;
}
// Override estimateSlideDuration if it exists
if(typeof estimateSlideDuration==='function'){
  window._origEstimateSlideDuration=estimateSlideDuration;
  window.estimateSlideDuration=function(idx){
    const sl=allSlides[idx];if(!sl)return 30;
    const ov=_notesOverrides.get(idx);
    const script=ov&&ov.script!=null?ov.script:getSlideNotes(idx);
    if(!script||!script.trim())return _origEstimateSlideDuration(idx);
    const{pre,over}=_splitOverVideo(script);
    const vidSec=_videoSecondsFor(idx);
    const wpm=_effectiveWpm();
    const preSec=_wordsCount(pre)/wpm*60;
    // Words AFTER (over video) are spoken concurrently with the video.
    // Slide time = pre-speech + max(video_dur, over-speech).
    const overSec=_wordsCount(over)/wpm*60;
    const concurrent=Math.max(vidSec,overSec);
    let total=preSec+concurrent;
    const ty=sl.dataset.type||'';
    if(ty==='lesson'||ty==='bonus')total+=10;
    const ss=slideSteps.get(sl);
    if(ss&&ss.steps.length>1)total+=(ss.steps.length-1)*5;
    return Math.max(5,Math.round(total));
  };
}
function calcEstimateFromIdx(fromIdx){
  let total=0;
  for(let i=fromIdx;i<allSlides.length;i++){
    if(allSlides[i].dataset.hidden==='1')continue;
    total+=estimateSlideDuration(i);
  }
  return total;
}
function calcConsumedThrough(idx){
  let total=0;
  for(let i=0;i<=idx&&i<allSlides.length;i++){
    if(allSlides[i].dataset.hidden==='1')continue;
    total+=estimateSlideDuration(i);
  }
  return total;
}
// Hook slide advance to feed adaptive WPM
window._notesPrevAdvance={idx:null,t:null};
function _onSlideChange(newIdx){
  const prev=_notesPrevAdvance;
  if(prev.idx!=null&&prev.t!=null&&_talkStartTime){
    const sl=allSlides[prev.idx];
    if(sl&&sl.dataset.hidden!=='1'){
      const ov=_notesOverrides.get(prev.idx);
      const script=ov&&ov.script!=null?ov.script:getSlideNotes(prev.idx);
      const{pre,over}=_splitOverVideo(script||'');
      const wordsSpoken=_wordsCount(pre)+_wordsCount(over);
      const elapsedOnSlide=(Date.now()-prev.t)/1000;
      // Subtract concurrent video time from elapsed for WPM calc, since words run alongside video
      const vidSec=_videoSecondsFor(prev.idx);
      const speakingTime=Math.max(1,elapsedOnSlide-Math.min(vidSec,elapsedOnSlide*.6));
      if(wordsSpoken>15&&speakingTime>10){
        _wpmSamples.push({words:wordsSpoken,seconds:speakingTime});
        if(_wpmSamples.length>=3){
          const recent=_wpmSamples.slice(-8);
          const wTotal=recent.reduce((a,s)=>a+s.words,0);
          const sTotal=recent.reduce((a,s)=>a+s.seconds,0);
          const calc=wTotal/sTotal*60;
          _adaptiveWpm=Math.max(90,Math.min(220,calc));
        }
      }
    }
  }
  _notesPrevAdvance={idx:newIdx,t:Date.now()};
}

// FEATURE: ?notes CLOUD SYNC CLIENT
// =====================================================================
window._notesConfig=null;
async function loadNotesConfig(){
  if(window._notesConfig)return window._notesConfig;
  try{
    const r=await fetch('notes-config.json',{cache:'no-store'});
    if(!r.ok)throw new Error('no config file');
    const cfg=await r.json();
    if(!cfg.gasUrl||!cfg.deckId)throw new Error('config missing gasUrl/deckId');
    window._notesConfig=cfg;return cfg;
  }catch(e){window._notesConfig=null;return null;}
}
async function syncCall(action,extra){
  const cfg=await loadNotesConfig();if(!cfg){const e=new Error('offline');e._offline=true;throw e;}
  const payload=Object.assign({action,deckId:cfg.deckId},extra||{});
  const resp=await fetch(cfg.gasUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload),redirect:'follow'});
  const data=await resp.json();
  if(!data.ok)throw new Error(data.error||'sync failed');
  return data.result;
}
function _slideRecordForSeed(idx){
  const sl=allSlides[idx];if(!sl)return null;
  return{idx,type:sl.dataset.type||'',title:getSlideTitle(idx)||'',script:getSlideNotes(idx)||'',bullets:null,video_seconds:null};
}
async function seedFromSections(force){
  const seedData=allSlides.map((_,i)=>_slideRecordForSeed(i)).filter(Boolean);
  if(force){await syncCall('setNotes',{slides:seedData});return{seeded:true,forced:true,count:seedData.length};}
  return await syncCall('seedNotes',{slides:seedData});
}
function _applyNotesData(data){
  if(!data)return;
  _notesOverrides.clear();
  (data.slides||[]).forEach(s=>{_notesOverrides.set(Number(s.idx),s);});
  _notesMeta=data.meta||{};
  if(_notesMeta.calibration){
    const c=_notesMeta.calibration;
    if(c.videoDurations)_videoDurationCache=Object.assign({},c.videoDurations);
    if(c.thumbnails)_slideThumbs=Object.assign({},c.thumbnails);
  }
}

function _fmtClock(d){const h=d.getHours(),m=d.getMinutes();const ap=h>=12?'PM':'AM';const h12=((h+11)%12)+1;return h12+':'+String(m).padStart(2,'0')+' '+ap;}
function _fmtMS(s){const sign=s<0?'-':'';s=Math.abs(s);const m=Math.floor(s/60),sec=Math.floor(s%60);return sign+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}

// Sentence-split bullets (cheap)
function autoBullets(script){
  if(!script||!script.trim())return[];
  const cleaned=script.replace(OVER_VIDEO_RE,' ').replace(/\s+/g,' ').trim();
  const sentences=cleaned.match(/[^.!?…]+[.!?…]+|[^.!?…]+$/g)||[cleaned];
  return sentences.map(s=>{
    const t=s.trim();if(!t)return null;
    const w=t.split(/\s+/);
    if(w.length<=14)return t;
    return w.slice(0,14).join(' ')+'…';
  }).filter(Boolean).slice(0,8);
}
function bulletsForSlide(idx){
  const ov=_notesOverrides.get(idx);
  if(ov&&Array.isArray(ov.bullets)&&ov.bullets.length)return ov.bullets;
  const script=ov&&ov.script!=null?ov.script:getSlideNotes(idx);
  return autoBullets(script);
}
function scriptForSlide(idx){
  const ov=_notesOverrides.get(idx);
  return ov&&ov.script!=null?ov.script:(getSlideNotes(idx)||'');
}

// View state

function _renderScriptHTML(script){

}
function naRenderContent(){

  }
}
function naRenderEdit(c){

    <textarea class="na-edit-textarea" id="na-edit-script" placeholder="Speaker script…">${(script||'').replace(/</g,'&lt;')}</textarea>
    <div style="font-size:.6rem;letter-spacing:.18em;color:#a78bfa;font-weight:700;margin:14px 0 6px">BULLETS OVERRIDE (one per line, blank = auto from script)</div>

    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="na-iconbtn" id="na-edit-save" style="flex:1;background:rgba(0,212,255,.2);border-color:rgba(0,212,255,.5);color:#00d4ff">Save</button>

  document.getElementById('na-edit-save').addEventListener('click',async()=>{

    try{await syncCall('setSlideNote',{idx,fields});naToast('Saved to cloud');}

function naRenderDoc(c){

      <textarea class="na-doc-script" data-idx="${i}" rows="3">${(script||'').replace(/</g,'&lt;')}</textarea>
    </div>`;
  }).join('');
  c.innerHTML='<div class="na-doc">'+html+'<div style="text-align:center;padding:18px;color:rgba(255,255,255,.4);font-size:.7rem">Tap any script to edit · auto-saves on blur · tap ≡ to close</div></div>';
  // Auto-grow + save on blur
